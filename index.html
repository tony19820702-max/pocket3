<head>

<title>포켓3 촬영 기법 가이드 — 130개 기법 DB</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--surface:#161b22;--surface2:#1f2937;--border:#30363d;
  --text:#e6edf3;--text-muted:#8b949e;--accent:#f5820d;
  --green:#3fb950;--green-bg:rgba(63,185,80,.12);
  --orange:#f5820d;--orange-bg:rgba(245,130,13,.12);
  --red:#f85149;--red-bg:rgba(248,81,73,.12);
  --blue:#58a6ff;--purple:#bc8cff;
}
html,body,#root{height:100%;overflow:hidden}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text)}
#root{display:flex;flex-direction:column;height:100vh}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:100;display:flex;align-items:center;justify-content:center;padding:16px;animation:fadeIn .15s ease}
.modal-box{background:var(--surface);border:1px solid var(--border);border-radius:16px;width:100%;max-width:680px;max-height:90vh;overflow-y:auto;animation:slideUp .2s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.step-item{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid rgba(48,54,61,.5);align-items:flex-start;font-size:13.5px;line-height:1.6}
.step-num{background:var(--accent);color:#fff;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:1px;font-family:'Inter',sans-serif}
.step-num.sub{background:var(--surface2);color:var(--text-muted);font-size:10px}
.tab-btn{padding:7px 14px;border:none;background:transparent;color:var(--text-muted);cursor:pointer;font-size:13px;font-family:'Noto Sans KR',sans-serif;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:600}
.tab-btn:hover{color:var(--text)}
.chip{display:inline-flex;align-items:center;padding:3px 10px;border-radius:99px;font-size:11px;font-weight:500;border:1px solid transparent;cursor:pointer;transition:all .15s;white-space:nowrap;font-family:'Noto Sans KR',sans-serif}
.chip:hover{opacity:.85}
.tag{display:inline-flex;align-items:center;padding:3px 8px;border-radius:99px;font-size:11px;font-weight:500;background:var(--surface2);color:var(--text-muted);white-space:nowrap}
.setting-row{display:flex;align-items:flex-start;gap:10px;padding:7px 0;border-bottom:1px solid rgba(48,54,61,.4);font-size:13.5px}
.setting-row:last-child{border-bottom:none}
/* Mobile responsive */
@media (max-width: 768px){
  .mobile-hide{display:none !important}
  .mobile-sidebar{position:fixed !important;top:0;left:0;bottom:0;width:80% !important;max-width:280px;z-index:200;transform:translateX(-100%);transition:transform .25s ease;box-shadow:8px 0 24px rgba(0,0,0,.5)}
  .mobile-sidebar.open{transform:translateX(0)}
  .mobile-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:150;animation:fadeIn .15s ease}
  .modal-box{max-height:95vh !important;border-radius:12px !important}
  .grid-cards{grid-template-columns:repeat(auto-fill,minmax(160px,1fr)) !important;gap:8px !important}
}
@media (max-width: 480px){
  .grid-cards{grid-template-columns:1fr 1fr !important}
}
</style>
</head>

<script>
window.DETAIL_DATA = {"1":{"settingsLines":["해상도/fps: 4K 24fps (시네마틱) 또는 30fps (일반)","셔터: 1/50 (24fps) 또는 1/60 (30fps)","ISO: 100","ND 필터: 야외 ND8~16","컬러: Normal 또는 D-Log M","짐벌: Follow, 속도 Slow"],"execution":"몸은 고정한 채 조이스틱 좌→우를 50% 미만으로 살짝만 기울여 길게 유지. 시작과\n끝에 각 2초씩 정지 구간 확보.","menuSteps":"1. 전원 켜기: 셔터 버튼 1회 누름\n2. 모드 선택: 화면 좌하단 모드 아이콘 탭 → 휠을 스와이프해 Video 선택\n3. 해상도 설정: 화면 아래에서 위로 스와이프 → 해상도 휠 4K, fps 휠 24 선택\n4. Pro 모드: 화면 우측 가장자리에서 왼쪽으로 스와이프 → 우상단 PRO 토글 탭 (파란색)\n5. 셔터·ISO: Exposure 탭 → M 토글 → 셔터 휠 1/50, ISO 휠 100으로 세로 스크롤\n6. 화이트밸런스: White Balance 탭 → M 토글 → 5500K\n7. 컬러 프로파일: Colors 탭 → Normal 선택\n8. 짐벌 모드: 화면 위에서 아래로 스와이프 → 짐벌 아이콘 → Follow\n9. 짐벌 속도: 걷는 사람 아이콘 탭 → Slow\n10. 녹화 시작: 셔터 버튼 1회 → 2초 정지\n11. 회전 실행: 조이스틱 오른쪽으로 50% 미만 살짝 기울여 천천히 회전\n12. 종료: 끝점에서 2초 정지 → 셔터 버튼 1회로 종료","editSteps":"","tip":"시작·끝 각 2초 정지로 컷 여유 확보. BGM 비트 컷에 맞춰 끼워 넣기.","mistake":"손목으로 회전시켜 화면이 떨림. → 조이스틱만 사용하고 본체는 가만히 두기.","fullName":"Pan(팬, 좌우 회전) 🟢 초급 · 풍경/도입샷"},"2":{"settingsLines":["해상도/fps: 4K 24fps","셔터: 1/50, ISO 100","컬러: Normal","짐벌: Follow, 속도 Slow"],"execution":"조이스틱 위 또는 아래로 살짝 기울임. 끝점에서 갑자기 멈추지 않고 부드럽게\n감속(easing).","menuSteps":"1. 전원 켜기: 셔터 버튼 1회\n2. 모드 선택: 좌하단 모드 아이콘 → Video\n3. 해상도: 아래→위 스와이프 → 4K 24fps\n4. Pro 모드: 우측→왼쪽 스와이프 → PRO ON\n\n\n5. 셔터·ISO: Exposure → M → 셔터 1/50, ISO 100\n6. WB: White Balance → M → 5500K\n7. 컬러: Colors → Normal\n8. 짐벌 모드: 위→아래 스와이프 → 짐벌 → Follow\n9. 짐벌 속도: 걷는 사람 아이콘 → Slow\n10. 녹화 시작: 셔터 1회 → 시작점 2초 고정\n11. 틸트 실행: 조이스틱 위 또는 아래로 천천히 기울임 → 끝점 갈수록 조이스틱 힘을 점점 풀기\n12. 종료: 끝점 2초 정지 → 셔터 1회","editSteps":"","tip":"빌딩 아래→위 틸트업은 \"스케일 확장\" 표현. 마지막 컷에 좋음.","mistake":"끝에서 갑자기 멈춰 영상이 튐. → 조이스틱을 점점 풀어 자연스럽게 감속.","fullName":"Tilt(틸트, 상하 회전) 🟢 초급 · 빌딩·인물 풀샷→얼굴"},"3":{"settingsLines":["해상도/fps: 4K 60fps (50% 슬로 여유)","셔터: 1/120, ISO 100","ND 필터: ND16","컬러: Normal","짐벌: Tilt-Locked"],"execution":"양손 그립, 팔꿈치를 갈비뼈에 압착. 닌자워크(무릎 살짝 굽히고 발끝→뒤꿈치 롤링)로\n직선 전진.","menuSteps":"1. 전원 켜기: 셔터 1회\n2. 모드 선택: 좌하단 모드 아이콘 → Video\n3. 해상도: 아래→위 스와이프 → 4K 60fps\n4. Pro 모드: 우측→왼쪽 스와이프 → PRO ON\n5. 셔터·ISO: Exposure → M → 셔터 1/120, ISO 100\n6. WB: White Balance → M → 5500K\n7. 컬러: Colors → Normal\n8. 짐벌 모드: 위→아래 스와이프 → 짐벌 → Tilt Locked\n9. 짐벌 속도: 걷는 사람 아이콘 → Default\n10. 녹화 시작: 셔터 1회\n11. 전진 실행: 양손 그립 + 팔꿈치 갈비뼈 압착 → 닌자워크로 피사체 향해 직선 전진 (피사체와\n30cm 이상 거리 유지)\n12. 종료: 셔터 1회","editSteps":"","tip":"음악 비트 드롭 직전에 푸시인 절정이 오도록 배치.","mistake":"너무 가까이 가서 20cm 한계로 AF 빠짐. → 30cm 이상 유지.","fullName":"Push-in(푸시인, 전진) 🟢 초급 · 인물 클로즈업·제품 리빌"},"4":{"settingsLines":["해상도/fps: 4K 60fps","셔터: 1/120, ISO 100","짐벌: Tilt-Locked"],"execution":"뒤로 닌자워크. 반드시 어깨를 잡아주는 가이드 동행자 필수(부딪힘 사고 방지).","menuSteps":"1. 전원 켜기: 셔터 1회\n2. 모드 선택: 좌하단 → Video\n3. 해상도: 아래→위 스와이프 → 4K 60fps\n4. Pro 모드: 우측→왼쪽 → PRO ON\n5. 셔터·ISO: Exposure → M → 1/120, 100\n6. WB: White Balance → M → 5500K\n7. 컬러: Colors → Normal\n8. 짐벌 모드: 위→아래 → 짐벌 → Tilt Locked\n9. 짐벌 속도: 걷는 사람 → Slow\n10. 안전 확보: 가이드 동행자가 토니님 어깨에 손 얹기\n11. 녹화 시작: 셔터 1회 → 시작점 2초 고정\n12. 후진 실행: 가이드의 인도로 뒤로 닌자워크\n13. 종료: 셔터 1회","editSteps":"","tip":"영상 마지막 클립으로 사용하면 호흡이 살아남.","mistake":"안전 미확보 → 부딪힘. 가이드 없이 혼자 후진하지 말 것.","fullName":"Pull-out(풀아웃, 후진) 🟢 초급 · 엔딩·풍경 리빌"},"5":{"settingsLines":["해상도/fps: 4K 24fps","셔터: 1/50, ISO 100","짐벌: Tilt-Locked"],"execution":"닌자워크 또는 셀카봉을 앞뒤로 밀기. 셀카봉이 진동을 흡수해 더 부드러움.","menuSteps":"1. 전원 켜기: 셔터 1회\n2. 모드 선택: 좌하단 → Video\n3. 해상도: 아래→위 스와이프 → 4K 24fps\n4. Pro 모드: 우측→왼쪽 → PRO ON\n5. 셔터·ISO: Exposure → M → 1/50, 100\n6. WB: White Balance → M → 5500K\n7. 컬러: Colors → Normal\n8. 짐벌 모드: 위→아래 → 짐벌 → Tilt Locked\n9. 짐벌 속도: 걷는 사람 → Default\n10. 녹화 시작: 셔터 1회\n11. 전후 이동 실행: 닌자워크로 일정 보폭 전진 또는 후진. 셀카봉 사용 시 봉을 앞뒤로 부드럽게\n밀기\n12. 종료: 셔터 1회","editSteps":"","tip":"범용 b-roll로 어디든 활용. 다른 무빙샷 사이에 붙이면 호흡 살아남.","mistake":"보폭이 일정하지 않으면 속도 변화가 보임. → 메트로놈 비트 듣고 보폭 통일.","fullName":"Dolly(달리, 전후 이동) 🟢 초급 · 범용 b-roll"},"6":{"settingsLines":["해상도/fps: 4K 24fps","셔터: 1/50, ISO 100","짐벌: Tilt-Locked 필수(수평 유지가 핵심)","광각 어댑터 권장"],"execution":"게걸음(crab walk)으로 한 발씩 교차. 코어를 잠그고 배꼽을 응시한다는 느낌으로.","menuSteps":"1. 전원 켜기: 셔터 1회\n2. 광각 어댑터 장착: (선택) 본체 렌즈 부분에 자석으로 부착\n3. 모드 선택: 좌하단 → Video\n4. 해상도: 아래→위 스와이프 → 4K 24fps\n\n\n5. Pro 모드: 우측→왼쪽 → PRO ON\n6. 셔터·ISO: Exposure → M → 1/50, 100\n7. WB: White Balance → M → 5500K\n8. 컬러: Colors → Normal\n9. 짐벌 모드: 위→아래 → 짐벌 → Tilt Locked (필수)\n10. 짐벌 속도: 걷는 사람 → Slow\n11. 녹화 시작: 셔터 1회\n12. 게걸음 실행: 코어 단단히 + 팔꿈치 갈비뼈 압착 → 한 발씩 교차하며 측면 이동 → 피사체\n항상 화면 중앙\n13. 종료: 셔터 1회","editSteps":"","tip":"시작·끝 정지 컷 + 측면 이동 → 시네마틱 시퀀스 완성.","mistake":"어깨가 흔들림 → 팔꿈치 압착 강화. 발끝이 진행 방향과 어긋남 → 게걸음 자세 점검.","fullName":"Truck/Track(측면 트래킹) 🟠 중급 · 워킹토크·패션릴"},"7":{"settingsLines":["해상도/fps: 4K 24fps","셔터: 1/50, ISO 100","짐벌: Tilt-Locked 필수(틸트 잠그지 않으면 어색함)"],"execution":"무릎을 굽혔다 펴며 카메라 위치만 변경. 카메라 각도는 유지.","menuSteps":"1. 전원 켜기: 셔터 1회\n2. 모드 선택: 좌하단 → Video\n3. 해상도: 아래→위 스와이프 → 4K 24fps\n4. Pro 모드: 우측→왼쪽 → PRO ON\n5. 셔터·ISO: Exposure → M → 1/50, 100\n6. WB: White Balance → M → 5500K\n7. 컬러: Colors → Normal\n8. 짐벌 모드: 위→아래 → 짐벌 → Tilt Locked (필수)\n9. 짐벌 속도: 걷는 사람 → Slow\n10. 녹화 시작: 셔터 1회\n11. 수직 이동 실행: 무릎과 엉덩이를 굽혔다 펴며 카메라를 위→아래 또는 아래→위로 평행\n이동. 카메라 각도는 처음 그대로 유지\n12. 종료: 셔터 1회","editSteps":"","tip":"제품 위에서 아래로 페데스탈 다운 → 제품의 위풍당당한 등장.","mistake":"무릎이 아니라 허리로 굽힘 → 허리 부상 위험. 무릎과 엉덩이를 모두 사용.","fullName":"Pedestal(페데스탈, 수직 평행 이동) 🟢 초급 · 제품 리빌"},"8":{"settingsLines":["해상도/fps: 4K 24fps","셔터: 1/50, ISO 100","짐벌: Tilt-Locked","셀카봉 끝에 Pocket 3 장착"],"execution":"셀카봉을 머리 위에서 천천히 내리며 동시에 조이스틱으로 살짝 틸트다운.\nActiveTrack 활성화 시 피사체 자동 추적.","menuSteps":"1. 전원 켜기: 셔터 1회\n2. 셀카봉 장착: 1m 이상 봉에 Pocket 3 결합\n3. 모드 선택: 좌하단 → Video\n4. 해상도: 아래→위 스와이프 → 4K 24fps\n5. Pro 모드: 우측→왼쪽 → PRO ON\n6. 셔터·ISO: Exposure → M → 1/50, 100\n7. WB: White Balance → M → 5500K\n8. 컬러: Colors → Normal\n9. 짐벌 모드: 위→아래 → 짐벌 → Tilt Locked\n10. 짐벌 속도: 걷는 사람 → Slow\n11. ActiveTrack(선택): 피사체 더블 탭 → 녹색 박스 확인\n12. 녹화 시작: 셔터 1회\n13. 크레인 실행: 셀카봉 머리 위로 들어 올린 상태에서 시작 → 양손 그립으로 천천히 내리며\n동시에 조이스틱 살짝 다운 → 부드러운 호 그리기\n14. 종료: 셔터 1회","editSteps":"","tip":"결혼식 신랑신부 등장, 부동산 매물 외관 인트로에 압도적.","mistake":"셀카봉 끝 흔들림. → 양손 그립 + 팔꿈치 고정. 봉이 짧으면 효과가 약함 → 1m 이상\n권장.","fullName":"Crane/Jib(크레인 흉내) 🟠 중급 · 결혼식·부동산·여행"},"9":{"settingsLines":["해상도/fps: 4K 24fps","셔터: 1/50, ISO 100","미니 삼각대 거치 필수"],"execution":"삼각대에 거치하고 카메라 손대지 않음. 무빙샷 사이에 5~10% 비율로 섞어주면\n호흡이 살아남.","menuSteps":"1. 삼각대 거치: 미니 삼각대에 Pocket 3 결합 (별매 1/4\" 핸들 필요)\n2. 전원 켜기: 셔터 1회\n3. 모드 선택: 좌하단 → Video\n4. 해상도: 아래→위 스와이프 → 4K 24fps\n5. Pro 모드: 우측→왼쪽 → PRO ON\n6. 셔터·ISO: Exposure → M → 1/50, ISO 환경에 맞춰 100~400\n7. WB: White Balance → M → 환경에 맞게 (실내 4500K, 자연광 5500K)\n8. 컬러: Colors → Normal 또는 D-Log M\n9. 짐벌 모드: 위→아래 → 짐벌 → Follow\n10. 녹화 시작: 셔터 1회 → 카메라 절대 만지지 않음\n11. 종료: 셔터 1회","editSteps":"","tip":"무빙샷 → 정지샷 → 무빙샷 패턴이 시네마틱.","mistake":"모든 컷을 무빙으로 가는 실수. → 정지 컷도 의도적으로 사용해야 시청자 눈이 쉼.","fullName":"Static Lock-Off(정지샷) 🟢 초급 · 인터뷰·인서트"},"10":{"settingsLines":["해상도/fps: 4K 24fps","셔터: 1/50, ISO 100","짐벌: FPV 모드, 속도를 약간 빠르게"],"execution":"핸드헬드처럼 자연 흔들림 허용. 너무 흔들리면 어지러우니 적당히.","menuSteps":"1. 전원 켜기: 셔터 1회\n2. 모드 선택: 좌하단 → Video\n\n\n3. 해상도: 아래→위 스와이프 → 4K 24fps\n4. Pro 모드: 우측→왼쪽 → PRO ON\n5. 셔터·ISO: Exposure → M → 1/50, 100\n6. WB: White Balance → M → 환경에 맞게\n7. 컬러: Colors → D-Log M (다큐 후보정)\n8. 짐벌 모드: 위→아래 → 짐벌 → FPV (핸드헬드 느낌의 핵심)\n9. 짐벌 속도: 걷는 사람 → Default 또는 Fast\n10. 녹화 시작: 셔터 1회\n11. 자연 흔들림 실행: 평소 호흡 정도의 자연 손떨림 허용. 너무 강하게 흔들지 않음\n12. 종료: 셔터 1회\nA-2. 고급 무브먼트 (11~22)","editSteps":"","tip":"인터뷰·리얼리티 톤. 진중한 분위기에 적합.","mistake":"너무 강하게 흔들어 멀미 유발 → 호흡 정도의 자연 흔들림만.","fullName":"Handheld Drift(핸드헬드 드리프트) 🟢 초급 · 인터뷰·다큐"},"11":{"settingsLines":["해상도/fps: 4K 60fps","셔터: 1/60(블러 강조 위해 평소보다 느리게)","ISO 100","짐벌: FPV 모드, 속도 Fast"],"execution":"손목 자체 회전(짐벌이 잠시 못 따라잡는 구간을 활용). 팬 중간 30%만 사용하고\n앞뒤는 컷.","menuSteps":"1. 전원 켜기: 셔터 1회\n2. 모드 선택: 좌하단 → Video\n3. 해상도: 아래→위 스와이프 → 4K 60fps\n4. Pro 모드: 우측→왼쪽 → PRO ON\n5. 셔터·ISO: Exposure → M → 셔터 1/60 (블러 강조), ISO 100\n6. WB: White Balance → M → 5500K\n7. 컬러: Colors → Normal\n8. 짐벌 모드: 위→아래 → 짐벌 → FPV (필수)\n9. 짐벌 속도: 걷는 사람 → Fast\n10. 녹화 시작: 셔터 1회\n\n\n11. 휩팬 실행: 시작점에서 1초 정지 → 손목과 팔로 빠르게 좌→우 휘두름 → 끝점 1초 정지\n12. 종료: 셔터 1회 → 편집에서 모션블러 절정 프레임에서 컷","editSteps":"","tip":"끝 프레임 모션블러 절정에서 컷 → 다음 클립도 같은 방향 윕팬으로 진입.","mistake":"짐벌 한계로 갑자기 멈춰 화면이 튐. → FPV 모드에서 부드럽게.","fullName":"Whip Pan(윕팬, 빠른 휘두름) 🟠 중급 · 트랜지션·비트 컷"},"12":{"settingsLines":["해상도/fps: 4K 60fps","셔터: 1/60, ISO 100","짐벌: FPV 모드, 속도 Fast"],"execution":"신발 클로즈업에서 시작 → 휙 위로 올려 얼굴 등장. 인스타 OOTD 인트로 황금 패턴.","menuSteps":"1. 전원 켜기: 셔터 1회\n2. 모드 선택: 좌하단 → Video\n3. 해상도: 아래→위 스와이프 → 4K 60fps\n4. Pro 모드: 우측→왼쪽 → PRO ON\n5. 셔터·ISO: Exposure → M → 1/60, 100\n6. WB: White Balance → M → 5500K\n7. 컬러: Colors → Normal\n8. 짐벌 모드: 위→아래 → 짐벌 → FPV\n9. 짐벌 속도: 걷는 사람 → Fast\n10. 녹화 시작: 셔터 1회\n11. 윕틸트 실행: 신발 또는 발 클로즈업에서 1초 정지 → 손목으로 빠르게 위로 올려 얼굴 등장\n→ 1초 정지\n12. 종료: 셔터 1회","editSteps":"","tip":"같은 방향 윕틸트 두 클립을 연결하면 매끄러운 트랜지션.","mistake":"끝점 컴포지션이 어긋남 → 시작·끝 위치 미리 표시.","fullName":"Whip Tilt(윕틸트, 빠른 상하) 🟠 중급 · 발→얼굴 인트로"},"13":{"settingsLines":["해상도/fps: 4K 24fps","셔터: 1/50, ISO 100","짐벌: FPV 모드 필수 (Follow나 Tilt-Locked는 롤을 자동 보정해서 더치 앵글이 안 됨)"],"execution":"손목을 15~30° 기울여 유지. 너무 많이 기울이면 어지럽고, 너무 적으면 의도가 안\n보임.","menuSteps":"1. 전원 켜기: 셔터 1회\n2. 모드 선택: 좌하단 → Video\n3. 해상도: 아래→위 스와이프 → 4K 24fps\n4. Pro 모드: 우측→왼쪽 → PRO ON\n5. 셔터·ISO: Exposure → M → 1/50, 100\n6. WB: White Balance → M → 환경에 맞게\n7. 컬러: Colors → D-Log M (시네마틱)\n8. 짐벌 모드: 위→아래 → 짐벌 → FPV (필수, 다른 모드는 롤 자동 보정됨)\n9. 짐벌 속도: 걷는 사람 → Default\n10. 녹화 시작: 셔터 1회\n11. 더치 앵글 실행: 손목을 15~30° 기울임 → 그 상태로 유지하면서 촬영\n12. 종료: 셔터 1회","editSteps":"","tip":"일반 컷 사이에 더치 앵글을 1~2초 끼우면 긴장감.","mistake":"Follow 모드에서 시도 → 짐벌이 자동 수평 복원해서 더치 앵글이 안 만들어짐. 반드시\nFPV.","fullName":"Roll / Dutch Angle(더치 앵글) 🟠 중급 · 호러·꿈·아트"},"14":{"settingsLines":["해상도/fps: 4K 30fps","셔터: 1/60, ISO 100","짐벌: Follow","Smart Gimbal: SpinShot 90° 또는 180°"],"execution":"Smart Gimbal Mode에서 SpinShot 활성화 → 90° 또는 180° 선택 → 셔터 누르면\n자동 회전.","menuSteps":"1. 전원 켜기: 셔터 1회\n2. 모드 선택: 좌하단 → Video (SpinShot은 Video 모드에서만)\n3. 해상도: 아래→위 스와이프 → 4K 30fps\n4. Pro 모드: 우측→왼쪽 → PRO ON\n5. 셔터·ISO: Exposure → M → 1/60, 100\n6. WB: White Balance → M → 5500K\n7. 컬러: Colors → Normal\n8. 짐벌 모드: 위→아래 → 짐벌 → Follow\n9. Smart Gimbal Mode 진입: 화면 좌측 가장자리 중앙의 인물 아이콘 탭\n10. SpinShot 선택: SpinShot → 90° 또는 180° 중 선택\n11. 시작·끝 컴포지션 정렬: 회전이 자연스럽게 끝나도록 시작 각도 정렬\n12. 녹화 시작: 셔터 1회 → 짐벌이 자동으로 회전하며 녹화\n13. 종료: 회전 완료 후 셔터 1회 → 다시 인물 아이콘 탭해 SpinShot 해제","editSteps":"","tip":"회전 끝나는 각도에서 다음 클립 시작 → 자연 트랜지션.","mistake":"시작·끝 컴포지션을 안 맞춤 → 회전 끝나는 각도가 어색. 미리 정렬 필수.","fullName":"Spin Shot(스핀, 90/180°) 🟢 초급 · 트랜지션·패션릴"},"15":{"settingsLines":["해상도/fps: 4K 24fps","셔터: 1/50, ISO 100","짐벌: Follow","ActiveTrack 6.0 ON","광각 어댑터 권장(반경 단축)"],"execution":"피사체 더블 탭으로 락. 반경 2~3m 일정 유지하며 십자걸음.","menuSteps":"1. 전원 켜기: 셔터 1회\n2. 광각 어댑터 장착: (권장) 자석으로 부착\n3. 모드 선택: 좌하단 → Video\n4. 해상도: 아래→위 스와이프 → 4K 24fps\n5. Pro 모드: 우측→왼쪽 → PRO ON\n6. 셔터·ISO: Exposure → M → 1/50, 100\n7. WB: White Balance → M → 환경에 맞게\n8. 컬러: Colors → Normal 또는 D-Log M\n\n\n9. 짐벌 모드: 위→아래 → 짐벌 → Follow\n10. 짐벌 속도: 걷는 사람 → Default\n11. ActiveTrack: 피사체를 화면에서 더블 탭 → 녹색 박스 확인\n12. 녹화 시작: 셔터 1회\n13. 오빗 실행: 피사체와 거리 2~3m 일정 유지 → 십자걸음(앞에 X자로 발 교차)으로 360° 원\n그리기 → ActiveTrack이 피사체를 자동 중앙 유지\n14. 종료: 한 바퀴 완료 후 셔터 1회","editSteps":"","tip":"피사체 등장 첫 컷으로 사용. 결혼식 신랑신부 입장에 압도적.","mistake":"발이 꼬여 중심 이탈. → 사전에 빈 회전(dry run) 1회 권장.","fullName":"Orbit(오빗, 360° 원형 이동) 🟠 중급 · 인물 등장·결혼식"},"16":{"settingsLines":["해상도/fps: 4K 24fps","셔터: 1/50, ISO 100","짐벌: Tilt-Locked","ActiveTrack로 피사체 중앙 유지"],"execution":"오빗의 부분 버전. 피사체 주위를 90~180°만 호 그리듯 이동.","menuSteps":"1. 전원 켜기: 셔터 1회\n2. 모드 선택: 좌하단 → Video\n3. 해상도: 아래→위 스와이프 → 4K 24fps\n4. Pro 모드: 우측→왼쪽 → PRO ON\n5. 셔터·ISO: Exposure → M → 1/50, 100\n6. WB: White Balance → M → 5500K\n7. 컬러: Colors → Normal\n8. 짐벌 모드: 위→아래 → 짐벌 → Tilt Locked\n9. 짐벌 속도: 걷는 사람 → Slow\n10. ActiveTrack: 피사체 더블 탭 → 녹색 박스 확인\n11. 녹화 시작: 셔터 1회\n12. 호 실행: 피사체와 반경 2m 이상 유지하며 90~180°만 호 그리듯 이동 (전체 원이 아니라\n부분 원호)\n13. 종료: 셔터 1회","editSteps":"","tip":"인터뷰 시작 컷 또는 자동차 광고 인트로에 효과적.","mistake":"호가 너무 작아 효과 안 남 → 반경 2m 이상 확보.","fullName":"Arc Shot(호 그리기) 🟠 중급 · 차량·인터뷰 인트로"},"17":{"settingsLines":["해상도/fps: 4K 24fps","셔터: 1/50, ISO 100","짐벌: Tilt-Locked","광각 어댑터"],"execution":"전경 오브젝트(잎, 벽, 사람)를 카메라 앞에서 측면으로 통과시키며 슬라이드.","menuSteps":"1. 전원 켜기: 셔터 1회\n2. 광각 어댑터 장착: (권장)\n3. 모드 선택: 좌하단 → Video\n4. 해상도: 아래→위 스와이프 → 4K 24fps\n5. Pro 모드: 우측→왼쪽 → PRO ON\n6. 셔터·ISO: Exposure → M → 1/50, 100\n7. WB: White Balance → M → 5500K\n8. 컬러: Colors → D-Log M\n9. 짐벌 모드: 위→아래 → 짐벌 → Tilt Locked\n10. 짐벌 속도: 걷는 사람 → Slow\n11. 전경 배치: 잎·벽·사람 등 큰 오브젝트가 카메라 앞 30cm 이내에 있도록 위치 잡기\n12. 녹화 시작: 셔터 1회\n13. 리빌 실행: 측면으로 슬라이드(트럭) → 전경 오브젝트가 카메라 앞을 통과하며 뒤의 피사체\n점차 등장\n14. 종료: 셔터 1회","editSteps":"","tip":"호기심 유발 인트로에 강력. 영상 첫 1초에 배치하면 후크.","mistake":"전경 오브젝트가 너무 작아 효과 약함 → 화면의 50% 이상 가리는 큰 오브젝트 사용.","fullName":"Reveal Shot(리빌) 🟢 초급 · 트래블·매장 등장"},"18":{"settingsLines":["해상도/fps: 4K 24fps","셔터: 1/50, ISO 100","짐벌: Tilt-Locked + 측면 트럭"],"execution":"시작 위치를 벽·기둥 뒤에 100% 가린 상태로 두고, 측면 트럭으로 슬라이드 아웃하며\n피사체 등장.","menuSteps":"1. 전원 켜기: 셔터 1회\n2. 모드 선택: 좌하단 → Video\n3. 해상도: 아래→위 스와이프 → 4K 24fps\n4. Pro 모드: 우측→왼쪽 → PRO ON\n5. 셔터·ISO: Exposure → M → 1/50, 100\n6. WB: White Balance → M → 5500K\n7. 컬러: Colors → D-Log M\n8. 짐벌 모드: 위→아래 → 짐벌 → Tilt Locked\n9. 짐벌 속도: 걷는 사람 → Slow\n10. 시작 위치: 카메라를 벽·기둥 뒤에 100% 완전히 가림 (화면 검은 상태)\n11. 녹화 시작: 셔터 1회 → 시작 후 0.5초 검은 상태 유지\n12. 슬라이드 아웃 실행: 측면 트럭으로 천천히 벽·기둥에서 빠져나옴 → 피사체 등장\n13. 종료: 셔터 1회","editSteps":"","tip":"0.5초 검은 화면에서 시작 → 슬라이드 아웃 → 피사체 등장. 광고 인트로 황금 패턴.","mistake":"시작 위치 가림이 70~80%만 → 호기심 효과 약함. 100% 가림 필수.","fullName":"Hidden Reveal(히든 리빌) 🟠 중급 · 광고·미스터리"},"19":{"settingsLines":["해상도/fps: 4K 24fps","셔터: 1/50, ISO 100","짐벌: Tilt-Locked + 광각 어댑터","ActiveTrack로 배경 피사체 락"],"execution":"측면 트럭하면서 가까운 전경(난간, 식물, 가로등)을 의도적으로 배치.","menuSteps":"1. 전원 켜기: 셔터 1회\n\n\n2. 광각 어댑터 장착: 필수\n3. 모드 선택: 좌하단 → Video\n4. 해상도: 아래→위 스와이프 → 4K 24fps\n5. Pro 모드: 우측→왼쪽 → PRO ON\n6. 셔터·ISO: Exposure → M → 1/50, 100\n7. WB: White Balance → M → 5500K\n8. 컬러: Colors → D-Log M\n9. 짐벌 모드: 위→아래 → 짐벌 → Tilt Locked\n10. 짐벌 속도: 걷는 사람 → Slow\n11. ActiveTrack: 배경의 피사체를 더블 탭 → 녹색 박스\n12. 전경 확인: 카메라에서 1~2m 이내에 난간·식물·가로등 등 전경 오브젝트 위치 확인\n13. 녹화 시작: 셔터 1회\n14. 패럴랙스 실행: 게걸음으로 측면 트럭 → 전경이 빠르게 흘러가고 배경은 ActiveTrack으로\n중앙 유지 → 3D 깊이감\n15. 종료: 셔터 1회","editSteps":"","tip":"시네마틱 b-roll의 시그니처. 영상 중반에 1~2개 끼워 넣으면 퀄리티 급상승.","mistake":"전경이 너무 멀어서 패럴랙스 효과 약함 → 카메라에서 1~2m 이내 전경 배치.","fullName":"Parallax Shot(패럴랙스) 🟠 중급 · 시네마틱 b-roll"},"20":{"settingsLines":["해상도/fps: 4K 60fps (슬로 여유)","셔터: 1/120, ISO 100","짐벌: Tilt-Locked","후반 작업: Premiere에서 Scale 키프레임 합성"],"execution":"셀카봉으로 피사체에서 천천히 멀어지며 동시에 후반 줌인. 또는 디지털 2x\n줌(2.7K/1080p)을 동시 사용.","menuSteps":"1. 전원 켜기: 셔터 1회\n2. 셀카봉 장착: (권장)\n3. 모드 선택: 좌하단 → Video\n4. 해상도: 아래→위 스와이프 → 4K 60fps\n5. Pro 모드: 우측→왼쪽 → PRO ON\n6. 셔터·ISO: Exposure → M → 1/120, 100\n7. WB: White Balance → M → 5500K\n\n\n8. 컬러: Colors → D-Log M\n9. 짐벌 모드: 위→아래 → 짐벌 → Tilt Locked\n10. 짐벌 속도: 걷는 사람 → Slow\n11. 녹화 시작: 셔터 1회\n12. 버티고 실행: 셀카봉 사용해 피사체에서 천천히 후진 → 4K 원본 그대로 촬영\n13. 종료: 셔터 1회\n14. 후반 작업(Premiere): 클립 선택 → Effect Controls → Scale 100%→200% 키프레임 →\n후진 속도와 매칭되게 조정","editSteps":"","tip":"4K 원본 촬영 → Premiere에서 Scale 100% → 200% 키프레임으로 줌인 합성. 디지털\n줌보다 화질 우수.","mistake":"멀어지는 속도와 줌인 속도가 안 맞아 피사체 크기 변함 → 사전 테스트 여러 번.","fullName":"Vertigo / Dolly Zoom(버티고) 🔴 고급 · 사이코 드라마·깨달음"},"21":{"settingsLines":["해상도/fps: 4K 30fps (원본)","셔터: 1/60, ISO 100","짐벌: Follow","후반 작업: Premiere Scale 키프레임 0.5초"],"execution":"4K 원본 촬영 후 Premiere에서 Scale 100%→200% 키프레임을 0.5초 안에 +\nMotion Blur 추가 + 가벼운 셰이크.","menuSteps":"1. 전원 켜기: 셔터 1회\n2. 모드 선택: 좌하단 → Video\n3. 해상도: 아래→위 스와이프 → 4K 30fps\n4. Pro 모드: 우측→왼쪽 → PRO ON\n5. 셔터·ISO: Exposure → M → 1/60, 100\n6. WB: White Balance → M → 환경에 맞게\n7. 컬러: Colors → Normal\n8. 짐벌 모드: 위→아래 → 짐벌 → Follow\n9. 녹화 시작: 셔터 1회\n10. 와이드 촬영: 피사체 정상 거리에서 4K 원본 그대로 촬영 (줌 작업은 후반에서)\n11. 종료: 셔터 1회\n12. 후반 작업(Premiere): Adjustment Layer 위에 Scale 100%→200% 키프레임 0.5초 +\nMotion Blur + Camera Shake 효과 추가","editSteps":"","tip":"Bass Drop SFX 동시 적용 → 효과 2배.","mistake":"줌인이 너무 느림 → 0.3~0.5초 안에 완료해야 코미디 톤.","fullName":"Crash Zoom(크래쉬 줌) 🟠 중급 · 코미디·리액션"},"22":{"settingsLines":["해상도/fps: 4K 24fps","셔터: 1/50, ISO 100","짐벌: Tilt-Locked","셀카봉 사용"],"execution":"셀카봉을 접은 상태에서 시작 → 천천히 펴면서 동시에 카메라가 위로 상승 →\n빌딩·나무 등 키 큰 피사체 점차 등장.","menuSteps":"1. 전원 켜기: 셔터 1회\n2. 셀카봉 접은 상태로 장착: 시작은 봉을 완전히 접은 상태\n3. 모드 선택: 좌하단 → Video\n4. 해상도: 아래→위 스와이프 → 4K 24fps\n5. Pro 모드: 우측→왼쪽 → PRO ON\n6. 셔터·ISO: Exposure → M → 1/50, 100\n7. WB: White Balance → M → 5500K\n8. 컬러: Colors → D-Log M\n9. 짐벌 모드: 위→아래 → 짐벌 → Tilt Locked\n10. 짐벌 속도: 걷는 사람 → Slow\n11. 녹화 시작: 셔터 1회 → 시작점 1초 정지\n12. 부움업 실행: 셀카봉을 일정한 속도로 천천히 펴며 카메라 상승 → 키 큰 피사체 등장\n13. 종료: 끝점 1초 정지 → 셔터 1회\nA-3. 앵글 변화 (23~28)","editSteps":"","tip":"도시 빌딩 인트로, 폭포·고목 인트로에 강력.","mistake":"셀카봉이 펴지는 속도가 일정하지 않음 → 부드럽게 같은 속도로.","fullName":"Boom Up Reveal 🟠 중급 · 빌딩·나무 리빌"},"23":{"settingsLines":["해상도/fps: 4K 30fps","셔터: 1/60, ISO 100","짐벌: Follow 또는 Tilt-Locked","카메라 위치: 무릎 높이~지면 가까이"],"execution":"셀카봉을 거꾸로 들어 카메라를 지면 가까이 두고 피사체 향해 전진. 셀카봉 없으면\n무릎 굽혀 낮춤.","menuSteps":"1. 전원 켜기: 셔터 1회\n2. 셀카봉 거꾸로 장착: (권장) 카메라가 봉 아래쪽을 향하게\n3. 모드 선택: 좌하단 → Video\n4. 해상도: 아래→위 스와이프 → 4K 30fps\n5. Pro 모드: 우측→왼쪽 → PRO ON\n6. 셔터·ISO: Exposure → M → 1/60, 100\n7. WB: White Balance → M → 5500K\n8. 컬러: Colors → D-Log M\n9. 짐벌 모드: 위→아래 → 짐벌 → Follow\n10. 짐벌 속도: 걷는 사람 → Default\n11. 카메라 위치: 셀카봉 거꾸로 또는 무릎 굽혀 카메라를 무릎 높이~지면 가까이로\n12. 앵글 조정: 조이스틱으로 카메라를 살짝 위로 향하게 (피사체 머리까지 프레임에 들어오도록)\n13. 녹화 시작: 셔터 1회\n14. 로우앵글 푸시 실행: 피사체 향해 닌자워크로 전진\n15. 종료: 셔터 1회","editSteps":"","tip":"영웅 등장, 자동차 광고 인트로에 압도적.","mistake":"카메라가 너무 위를 향함 → 피사체 얼굴 잘림. 살짝만 위로 향하게.","fullName":"Low-Angle Push(로우앵글 푸시) 🟢 초급 · 영웅·자동차"},"24":{"settingsLines":["해상도/fps: 4K 30fps","셔터: 1/60, ISO 100~400 (실내 조명 따라)","짐벌: Follow","셀카봉 머리 위 사용"],"execution":"셀카봉을 머리 위로 올리고 조이스틱 아래 틸트. ActiveTrack로 자동 추적 가능.","menuSteps":"1. 전원 켜기: 셔터 1회\n2. 셀카봉 장착: 머리 위로 올릴 수 있는 길이\n3. 모드 선택: 좌하단 → Video\n4. 해상도: 아래→위 스와이프 → 4K 30fps\n5. Pro 모드: 우측→왼쪽 → PRO ON\n6. 셔터·ISO: Exposure → M → 1/60, ISO 100~400\n7. WB: White Balance → M → 실내 4500K, 자연광 5500K\n8. 컬러: Colors → Normal\n9. 짐벌 모드: 위→아래 → 짐벌 → Follow\n10. 셀카봉 위치: 셀카봉 머리 위로 들어 올림\n11. 앵글 조정: 조이스틱 아래로 끝까지 → 카메라가 거의 90° 다운\n12. ActiveTrack(선택): 화면에서 피사체 더블 탭\n13. 녹화 시작: 셔터 1회\n14. 종료: 셔터 1회","editSteps":"","tip":"요리·튜토리얼 도입샷, 음식 플랫레이의 표준.","mistake":"완전한 90° 다운이 안 됨 → Pocket 3 짐벌 구조상 직접 90° 다운은 어색. FPV-⊥\n모드 또는 미니 삼각대 + 매직암 클램프 사용.","fullName":"High-Angle Tilt-Down 🟢 초급 · 음식 플랫레이·튜토리얼"},"25":{"settingsLines":["해상도/fps: 4K 60fps","셔터: 1/120, ISO 100","짐벌: Follow","카메라 위치: 지면 가까이 (거의 누운 상태)"],"execution":"셀카봉을 지면에 거의 닿게 두거나, Pocket 3를 미니 삼각대로 바닥에 두고 화면\n회전(자동 세로 모드)으로 촬영.","menuSteps":"1. 전원 켜기: 셔터 1회\n2. 카메라 위치: 셀카봉을 지면에 거의 닿게, 또는 미니 삼각대에 거치해 바닥에\n3. 모드 선택: 좌하단 → Video\n4. 해상도: 아래→위 스와이프 → 4K 60fps\n5. Pro 모드: 우측→왼쪽 → PRO ON\n\n\n6. 셔터·ISO: Exposure → M → 1/120, 100\n7. WB: White Balance → M → 5500K\n8. 컬러: Colors → D-Log M\n9. 짐벌 모드: 위→아래 → 짐벌 → Follow\n10. 짐벌 속도: 걷는 사람 → Default\n11. 앵글 조정: 조이스틱 위로 → 카메라가 살짝 위를 향함 (피사체가 거대하게 보이도록)\n12. 녹화 시작: 셔터 1회\n13. 종료: 셔터 1회\nA-3. 앵글 변화 (계속)","editSteps":"","tip":"자동차 휠 회전, 스케이트보드 트릭, 발걸음 클로즈업 등 액션에 강력.","mistake":"바닥 진동이 그대로 잡힘 → 피사체가 정지일 때만 가능. 또는 미니 삼각대 사용.","fullName":"Worm's Eye View(벌레 시점) 🟠 중급 · 자동차 휠·스케이트"},"26":{"settingsLines":["해상도/fps: 4K 30fps","셔터: 1/60, ISO 100~400","짐벌: FPV-⊥ 모드(2024.5 펌웨어 이상에서 직각 유지에 최적)","셀카봉 풀 익스텐션"],"execution":"셀카봉을 끝까지 펴서 머리 위로 올리고, 조이스틱을 끝까지 아래로 → 카메라가 거의\n90° 다운. FPV-⊥ 모드가 가장 깔끔함.","menuSteps":"1. 펌웨어 확인: Mimo 앱 → 디바이스 정보 → v01.04.08.02 이상 확인\n2. 전원 켜기: 셔터 1회\n3. 셀카봉 풀 익스텐션: 봉을 최대 길이로 펴기\n4. 모드 선택: 좌하단 → Video\n5. 해상도: 아래→위 스와이프 → 4K 30fps\n6. Pro 모드: 우측→왼쪽 → PRO ON\n7. 셔터·ISO: Exposure → M → 1/60, ISO 100~400\n8. WB: White Balance → M → 환경에 맞게\n9. 컬러: Colors → Normal\n10. 짐벌 모드: 위→아래 → 짐벌 → FPV-⊥ (직각 유지에 최적)\n\n\n11. 셀카봉 머리 위로: 봉을 머리 위로 들어 올림\n12. 조이스틱 다운: 카메라가 90° 다운되도록 조이스틱 아래 끝까지\n13. 녹화 시작: 셔터 1회\n14. 종료: 셔터 1회","editSteps":"","tip":"음식 플랫레이, 핸드 튜토리얼, 요가 동작에 강력.","mistake":"일반 Follow 모드로는 완전한 90° 다운이 어색함 → 펌웨어 v01.04.08.02 이상에서\nFPV-⊥ 사용.","fullName":"Bird's Eye View(조감) 🟠 중급 · 요리·요가"},"27":{"settingsLines":["해상도/fps: 4K 24fps","셔터: 1/50, ISO 100~400","짐벌: Follow","광각 어댑터 권장"],"execution":"인물 A의 어깨 너머로 인물 B를 촬영. 어깨가 프레임의 1/3을 차지하도록 위치 조정.","menuSteps":"1. 전원 켜기: 셔터 1회\n2. 모드 선택: 좌하단 → Video\n3. 해상도: 아래→위 스와이프 → 4K 24fps\n4. Pro 모드: 우측→왼쪽 → PRO ON\n5. 셔터·ISO: Exposure → M → 1/50, 100~400\n6. WB: White Balance → M → 실내 환경에 맞게\n7. 컬러: Colors → D-Log M\n8. 짐벌 모드: 위→아래 → 짐벌 → Follow\n9. 카메라 위치: 인물 A의 어깨 뒤쪽 30~50cm\n10. 프레이밍: 인물 A 어깨가 프레임 1/4~1/3, 인물 B 얼굴이 중앙\n11. 녹화 시작: 셔터 1회\n12. 종료: 셔터 1회","editSteps":"","tip":"대화 장면 컷백 시 A→B→A 순서로 OTS 컷.","mistake":"어깨가 너무 크게 차지해 답답함 → 어깨가 프레임 1/4~1/3 정도가 황금비.","fullName":"Over-the-Shoulder(어깨 너머) 🟢 초급 · 인터뷰·드라마"},"28":{"settingsLines":["해상도/fps: 4K 60fps","셔터: 1/120, ISO 100","짐벌: FPV 모드","광각 어댑터 권장","가슴 높이 또는 이마 높이 앞향"],"execution":"가슴 마운트나 손에 들고 정면으로 향하게. FPV 모드로 자연 흔들림 허용.","menuSteps":"1. 전원 켜기: 셔터 1회\n2. 광각 어댑터 장착: 권장\n3. 모드 선택: 좌하단 → Video\n4. 해상도: 아래→위 스와이프 → 4K 60fps\n5. Pro 모드: 우측→왼쪽 → PRO ON\n6. 셔터·ISO: Exposure → M → 1/120, 100\n7. WB: White Balance → M → 5500K\n8. 컬러: Colors → Normal\n9. 짐벌 모드: 위→아래 → 짐벌 → FPV (필수)\n10. 짐벌 속도: 걷는 사람 → Fast\n11. 카메라 위치: 가슴 높이 또는 이마 높이로 정면 향함\n12. 녹화 시작: 셔터 1회\n13. POV 실행: 본인 시선과 같은 방향으로 자연스럽게 활동\n14. 종료: 셔터 1회\nA-4. 걷기 촬영 (29~35)","editSteps":"","tip":"먹방 1인칭, 워킹 1인칭 일상 브이로그에 강력.","mistake":"Follow 모드 사용 → 짐벌이 너무 부드러워 POV 느낌 약함. FPV 필수.","fullName":"POV(1인칭) 🟢 초급 · 액션·먹방"},"29":{"settingsLines":["모든 워킹샷에 공통 적용","짐벌: 어떤 모드든 OK"],"execution":"무릎 살짝 굽힘 → 발끝→뒤꿈치 롤링 → 어깨 정지 → 팔꿈치 갈비뼈에 압착 → 호흡\n길게.","menuSteps":"1. 거울 앞 사전 연습: Pocket 3 없이 빈 손으로 닌자 걸음 5분 연습\n2. 자세 점검 5가지:\n○ 무릎 살짝 굽혀 (10° 정도)\n○ 발끝부터 닿게 → 뒤꿈치 마지막 (구르듯)\n○ 어깨는 완전 고정 (걸음에 흔들리지 않게)\n○ 팔꿈치 갈비뼈에 단단히 압착\n○ 호흡 깊고 길게 (숨 차게 하지 않기)\n3. 속도: 평소 걸음의 70% (천천히)\n4. 머릿속 이미지: \"물 가득 든 그릇 머리에 인 사람\"\n5. 이 자세를 다른 모든 워킹샷에 적용","editSteps":"","tip":"이 자세 하나로 모든 워킹샷 퀄리티 2배.","mistake":"평소처럼 걸어 통통 튐 → 캥거루 현상. 거울 앞에서 사전 연습 필수.","fullName":"Ninja Walk(닌자 걸음) 🟢 초급 · 모든 워킹샷의 기본"},"30":{"settingsLines":["해상도/fps: 4K 30fps","셔터: 1/60, ISO 100","짐벌: Follow + ActiveTrack","거리 1.5~2m 일정 유지"],"execution":"피사체 등 뒤 1.5~2m 거리 유지하며 닌자 걸음으로 따라감. ActiveTrack이 자동 중앙\n유지.","menuSteps":"1. 전원 켜기: 셔터 1회\n2. 모드 선택: 좌하단 → Video\n3. 해상도: 아래→위 스와이프 → 4K 30fps\n4. Pro 모드: 우측→왼쪽 → PRO ON\n5. 셔터·ISO: Exposure → M → 1/60, 100\n6. WB: White Balance → M → 5500K\n7. 컬러: Colors → Normal\n8. 짐벌 모드: 위→아래 → 짐벌 → Follow\n9. 짐벌 속도: 걷는 사람 → Default\n10. ActiveTrack: 피사체 등 뒤를 더블 탭 → 녹색 박스 확인\n\n\n11. 녹화 시작: 셔터 1회\n12. 추적 실행: 닌자 걸음으로 거리 1.5~2m 일정 유지하며 따라감\n13. 종료: 셔터 1회","editSteps":"","tip":"브이로그 첫 컷, 영상 도입에 자연스러운 진입.","mistake":"거리가 들쑥날쑥 → 피사체 크기가 변함. 일정 거리 유지가 핵심.","fullName":"Hero Walk(히어로 워크, 등 뒤 추적) 🟢 초급 · 브이로그 인트로"},"31":{"settingsLines":["해상도/fps: 4K 24fps","셔터: 1/50, ISO 100","짐벌: Tilt-Locked","ActiveTrack 6.0","반드시 가이드 동행자"],"execution":"피사체 정면에서 뒤로 닌자 걸음. 가이드가 어깨에 손 얹어 안전 확보. 또는 셀카봉에\n거꾸로 매달아 ActiveTrack 자동 추적.","menuSteps":"1. 전원 켜기: 셔터 1회\n2. 모드 선택: 좌하단 → Video\n3. 해상도: 아래→위 스와이프 → 4K 24fps\n4. Pro 모드: 우측→왼쪽 → PRO ON\n5. 셔터·ISO: Exposure → M → 1/50, 100\n6. WB: White Balance → M → 5500K\n7. 컬러: Colors → D-Log M\n8. 짐벌 모드: 위→아래 → 짐벌 → Tilt Locked\n9. 짐벌 속도: 걷는 사람 → Slow\n10. ActiveTrack: 피사체 얼굴 더블 탭\n11. 안전 확보: 가이드 동행자가 토니님 어깨에 손 얹기\n12. 녹화 시작: 셔터 1회\n13. 후진 닌자 걸음: 피사체와 거리 1.5~2m 유지하며 가이드의 인도로 뒤로 걸음\n14. 종료: 셔터 1회","editSteps":"","tip":"패션 릴스 OOTD, 인터뷰 워킹 토크에 강력.","mistake":"혼자 뒤로 걸으면 부딪힘 사고 → 반드시 가이드 동행 또는 셀카봉 거꾸로 사용.","fullName":"Lead Walk(리드 워크, 앞에서 뒤로) 🟠 중급 · 패션·인터뷰"},"32":{"settingsLines":["해상도/fps: 4K 24fps","셔터: 1/50, ISO 100","짐벌: Tilt-Locked","ActiveTrack 락"],"execution":"피사체와 평행하게 측면 게걸음. 거리 2~3m 일정.","menuSteps":"1. 전원 켜기: 셔터 1회\n2. 모드 선택: 좌하단 → Video\n3. 해상도: 아래→위 스와이프 → 4K 24fps\n4. Pro 모드: 우측→왼쪽 → PRO ON\n5. 셔터·ISO: Exposure → M → 1/50, 100\n6. WB: White Balance → M → 5500K\n7. 컬러: Colors → D-Log M\n8. 짐벌 모드: 위→아래 → 짐벌 → Tilt Locked\n9. 짐벌 속도: 걷는 사람 → Default\n10. ActiveTrack: 피사체 더블 탭\n11. 녹화 시작: 셔터 1회\n12. 측면 게걸음: 피사체와 거리 2~3m 일정 유지하며 평행 이동\n13. 종료: 셔터 1회","editSteps":"","tip":"자동차 트래킹, 워킹 토크 시 강력.","mistake":"발이 꼬임 → 게걸음 사전 연습.","fullName":"Side-Walking(측면 따라가기) 🟠 중급 · 자동차·워킹토크"},"33":{"settingsLines":["해상도/fps: 4K 60fps (후반 슬로 여유)","셔터: 1/120, ISO 100~400","짐벌: FPV 모드","가벼운 조깅 속도"],"execution":"FPV 모드로 자연 흔들림 허용 → 피사체 추격. 후반에서 50~75% 슬로로 처리.","menuSteps":"1. 전원 켜기: 셔터 1회\n2. 모드 선택: 좌하단 → Video\n3. 해상도: 아래→위 스와이프 → 4K 60fps\n4. Pro 모드: 우측→왼쪽 → PRO ON\n5. 셔터·ISO: Exposure → M → 1/120, 100~400\n6. WB: White Balance → M → 5500K\n7. 컬러: Colors → Normal\n8. 짐벌 모드: 위→아래 → 짐벌 → FPV\n9. 짐벌 속도: 걷는 사람 → Fast\n10. 녹화 시작: 셔터 1회\n11. 추격 실행: 가벼운 조깅 속도로 피사체 따라감 (격렬한 달리기는 진동 너무 심함)\n12. 종료: 셔터 1회\n13. 후반 작업: CapCut에서 클립 50~75% 슬로 처리","editSteps":"","tip":"스포츠·액션·강아지 추격에 강력. BGM 비트와 동기화.","mistake":"너무 빨라 진동 → 4K 60fps 또는 120fps로 슬로로 진동 감춤.","fullName":"Chase Shot(추격) 🟠 중급 · 액션·스포츠"},"34":{"settingsLines":["해상도/fps: 4K 24fps","셔터: 1/50, ISO 100","짐벌: Tilt-Locked","ActiveTrack 6.0 자동 프레이밍"],"execution":"Lead Walk와 비슷하나 피사체와 더 가까운 거리(1m 정도). 인터뷰 친밀감.","menuSteps":"1. 전원 켜기: 셔터 1회\n2. 모드 선택: 좌하단 → Video\n3. 해상도: 아래→위 스와이프 → 4K 24fps\n4. Pro 모드: 우측→왼쪽 → PRO ON\n5. 셔터·ISO: Exposure → M → 1/50, 100\n6. WB: White Balance → M → 5500K\n7. 컬러: Colors → D-Log M\n\n\n8. 짐벌 모드: 위→아래 → 짐벌 → Tilt Locked\n9. 짐벌 속도: 걷는 사람 → Slow\n10. ActiveTrack: 피사체 얼굴 더블 탭 → Dynamic Framing 활성화 시 자동 프레이밍\n11. 안전 확보: 가이드 동행자 어깨에 손\n12. 녹화 시작: 셔터 1회\n13. 후진 실행: 피사체와 거리 1m 정도 유지하며 가이드 인도로 뒤로 걸음\n14. 종료: 셔터 1회","editSteps":"","tip":"인터뷰 워킹 토크, 친구 영상에 강력.","mistake":"가이드 없이 시도 → 부딪힘. 항상 가이드 동행.","fullName":"Walking Backwards 🟠 중급 · 인터뷰·친밀감"},"35":{"settingsLines":["해상도/fps: 4K 120fps (Slow Motion 모드, 4× 슬로)","셔터: 1/240, ISO 100~400","짐벌: FPV 모드","무릎 굽혀 Z축 흡수"],"execution":"Slow Motion 모드 진입 → 4K 120fps. 무릎 깊게 굽혀 Z축 진동 흡수하며 달리기.\n후반에서 슬로로 진동 감춤.","menuSteps":"1. 전원 켜기: 셔터 1회\n2. 모드 선택: 좌하단 → 휠 스와이프 → Slow Motion (Video 아님!)\n3. 해상도/배속: 아래→위 스와이프 → 4K 120fps\n4. Pro 모드: 우측→왼쪽 → PRO ON\n5. 셔터·ISO: Exposure → M → 1/240, 100~400\n6. WB: White Balance → M → 5500K\n7. 컬러: Colors → Normal 또는 D-Log M\n8. 짐벌 모드: 위→아래 → 짐벌 → FPV\n9. 짐벌 속도: 걷는 사람 → Fast\n10. 녹화 시작: 셔터 1회\n11. 달리기 실행: 무릎 깊게 굽혀 Z축 진동 흡수 → 피사체와 함께 달림\n12. 종료: 셔터 1회 (자동으로 슬로 처리되어 30fps 컨테이너로 저장)\n\n\nA-5. 창의적·Pocket 3 전용 (36~48)","editSteps":"","tip":"30% 속도(약 0.3x)로 처리하면 영화 같은 액션. BGM 드롭에 매칭.","mistake":"일반 Video 모드에서 달림 → 진동이 그대로 보임. 반드시 Slow Motion 120fps로\n후반 슬로.","fullName":"Running Shot(런닝) 🔴 고급 · 격렬한 액션"},"36":{"settingsLines":["해상도/fps: 4K 24fps","셔터: 1/50, ISO 100","짐벌: Tilt-Locked","광각 어댑터 필수","전경 1~2m 이내 배치"],"execution":"Tilt-Locked로 수평 강제 잠금 → 측면 게걸음 → 가까운 전경(난간·식물·기둥)\n통과시키며 깊이감.","menuSteps":"1. 전원 켜기: 셔터 1회\n2. 광각 어댑터 장착: 필수\n3. 모드 선택: 좌하단 → Video\n4. 해상도: 아래→위 스와이프 → 4K 24fps\n5. Pro 모드: 우측→왼쪽 → PRO ON\n6. 셔터·ISO: Exposure → M → 1/50, 100\n7. WB: White Balance → M → 5500K\n8. 컬러: Colors → D-Log M\n9. 짐벌 모드: 위→아래 → 짐벌 → Tilt Locked (시그니처)\n10. 짐벌 속도: 걷는 사람 → Slow\n11. 전경 확인: 카메라 1~2m 이내에 난간·식물·기둥 배치 확인\n12. 녹화 시작: 셔터 1회\n13. 측면 게걸음: 천천히 측면으로 이동 → 가까운 전경이 빠르게 흐름\n14. 종료: 셔터 1회","editSteps":"","tip":"Pocket 3 시네마틱 영상의 60%가 이 무브. 한 영상에 2~3컷 끼우면 퀄리티 급상승.","mistake":"전경 없이 측면 트럭만 → 패럴랙스 효과 없음. 전경 필수.","fullName":"Tilt-Locked Parallax 🟠 중급 · 시그니처 시네마틱"},"37":{"settingsLines":["해상도/fps: 4K 30fps","셔터: 1/60, ISO 100","짐벌: FPV","Smart Gimbal: SpinShot 180°","동시에 푸시인"],"execution":"SpinShot 180° 활성화 → 셔터 누르면 자동 회전 → 동시에 닌자 걸음으로 푸시인.","menuSteps":"1. 전원 켜기: 셔터 1회\n2. 모드 선택: 좌하단 → Video\n3. 해상도: 아래→위 스와이프 → 4K 30fps\n4. Pro 모드: 우측→왼쪽 → PRO ON\n5. 셔터·ISO: Exposure → M → 1/60, 100\n6. WB: White Balance → M → 5500K\n7. 컬러: Colors → D-Log M\n8. 짐벌 모드: 위→아래 → 짐벌 → FPV\n9. Smart Gimbal Mode 진입: 화면 좌측 인물 아이콘 탭 → SpinShot → 180°\n10. 녹화 시작: 셔터 1회 → 짐벌 자동 회전 시작\n11. 동시 푸시인: 회전 시작과 동시에 닌자 걸음으로 천천히 전진\n12. 종료: 회전 완료 후 셔터 1회 → 인물 아이콘 다시 탭해 SpinShot 해제","editSteps":"","tip":"Inception 같은 꿈/현실 전환 표현. 영상 중반 전환 컷에 강력.","mistake":"회전 속도와 전진 속도 안 맞음 → 전진 속도를 회전에 맞춰 천천히.","fullName":"Inception Shot(회전+패럴랙스) 🔴 고급 · 꿈·혼란"},"38":{"settingsLines":["해상도/fps: 4K 120fps (Slow Motion 모드)","셔터: 1/240, ISO 100~400","짐벌: Follow","빠른 오빗"],"execution":"Slow Motion 4K 120fps → 피사체 주위를 빠르게 오빗 → 후반에서 25% 슬로로\n매트릭스 같은 효과.","menuSteps":"1. 전원 켜기: 셔터 1회\n2. 모드 선택: 좌하단 → Slow Motion\n3. 해상도/배속: 아래→위 스와이프 → 4K 120fps\n4. Pro 모드: 우측→왼쪽 → PRO ON\n5. 셔터·ISO: Exposure → M → 1/240, 100~400\n6. WB: White Balance → M → 5500K\n7. 컬러: Colors → D-Log M\n8. 짐벌 모드: 위→아래 → 짐벌 → Follow\n9. 짐벌 속도: 걷는 사람 → Fast\n10. ActiveTrack: 피사체 더블 탭\n11. 녹화 시작: 셔터 1회\n12. 빠른 오빗: 피사체 정지 상태에서 카메라가 빠르게 한 바퀴 회전\n13. 종료: 셔터 1회 (자동 슬로 처리)","editSteps":"","tip":"댄스 영상, 액션 액티브 트랙에 강력. BGM 드롭과 동기화.","mistake":"오빗 속도 일정하지 않음 → 사전 트랙 마킹 또는 dry run.","fullName":"Bullet Time 흉내 🔴 고급 · 댄스·액션"},"39":{"settingsLines":["해상도/fps: 4K 30fps","셔터: 1/60, ISO 100~400","짐벌: Tilt-Locked","Glamour 비활성화(거울 반사에서 어색)","AF 락: 더블 탭으로 반사 피사체"],"execution":"거울 평면에 45° 접근 → 반사된 피사체+카메라가 함께 보이는 컴포지션. AF는 반사\n피사체에 락.","menuSteps":"1. 전원 켜기: 셔터 1회\n2. 모드 선택: 좌하단 → Video\n3. 해상도: 아래→위 스와이프 → 4K 30fps\n4. Pro 모드: 우측→왼쪽 → PRO ON\n5. 셔터·ISO: Exposure → M → 1/60, 100~400\n6. WB: White Balance → M → 환경에 맞게\n7. Glamour 끄기: PRO 패널 → Glamour Effects → OFF (거울에서 어색함)\n\n\n8. 컬러: Colors → Normal\n9. 짐벌 모드: 위→아래 → 짐벌 → Tilt Locked\n10. 카메라 위치: 거울 평면에 45° 각도로 접근\n11. AF 락: 화면에서 거울에 비친 피사체를 더블 탭 → 녹색 박스\n12. 녹화 시작: 셔터 1회\n13. 종료: 셔터 1회","editSteps":"","tip":"패션 릴스, 셀프 포트레이트, 호텔룸 인트로에 시네마틱.","mistake":"AF가 거울 표면에 잡힘 → 흐림. 반드시 반사된 피사체를 더블 탭으로 락.","fullName":"Mirror Shot 🟠 중급 · 패션·셀프 포트레이트"},"40":{"settingsLines":["해상도/fps: 4K 24fps","셔터: 1/50, ISO 100~400","짐벌: Tilt-Locked","셀카봉으로 낮은 앵글"],"execution":"비 온 날 가로등 반사, 빌딩 유리창 반사, 호수 수면 반사 등을 메인 컴포지션으로.","menuSteps":"1. 전원 켜기: 셔터 1회\n2. 셀카봉: 카메라를 낮은 앵글로\n3. 모드 선택: 좌하단 → Video\n4. 해상도: 아래→위 스와이프 → 4K 24fps\n5. Pro 모드: 우측→왼쪽 → PRO ON\n6. 셔터·ISO: Exposure → M → 1/50, 100~400\n7. WB: White Balance → M → 환경에 맞게\n8. 컬러: Colors → D-Log M\n9. 짐벌 모드: 위→아래 → 짐벌 → Tilt Locked\n10. 카메라 위치: 반사면(물·유리)에 가깝게 + 낮은 앵글\n11. 컴포지션: 반사가 화면의 50% 이상 차지하도록\n12. AF 락: 더블 탭으로 반사된 피사체에 포커스\n13. 녹화 시작: 셔터 1회\n14. 종료: 셔터 1회","editSteps":"","tip":"무드 b-roll로 어디든 활용. 골든아워와 결합하면 압도적.","mistake":"반사면이 흔들림 → 물에 가까이 갈수록 흔들림 잡힘. 미니 삼각대 권장.","fullName":"Reflection Shot(수면·유리) 🟠 중급 · 무드 b-roll"},"41":{"settingsLines":["해상도/fps: 4K 24fps","셔터: 1/50, ISO 100","짐벌: Tilt-Locked + 광각 어댑터","Pocket 3의 작은 폼팩터 활용"],"execution":"좁은 구멍·창문·다리 사이로 Pocket 3를 통과시킴. 통과 순간 검은 프레임 활용.","menuSteps":"1. 전원 켜기: 셔터 1회\n2. 광각 어댑터 장착\n3. 모드 선택: 좌하단 → Video\n4. 해상도: 아래→위 스와이프 → 4K 24fps\n5. Pro 모드: 우측→왼쪽 → PRO ON\n6. 셔터·ISO: Exposure → M → 1/50, 100\n7. WB: White Balance → M → 5500K\n8. 컬러: Colors → D-Log M\n9. 짐벌 모드: 위→아래 → 짐벌 → Tilt Locked\n10. 구멍·창문 사전 측정: Pocket 3가 통과 가능한지 확인\n11. 녹화 시작: 셔터 1회\n12. 통과 실행: 천천히 카메라를 구멍 너머로 슬라이드 → 검은 프레임 거쳐 새 장면\n13. 종료: 셔터 1회","editSteps":"","tip":"검은 프레임에서 컷 → 다른 장면으로 자연 트랜지션.","mistake":"구멍이 너무 좁아 카메라 부딪힘 → 사전 측정.","fullName":"Through-the-Object 🟠 중급 · 음악비디오·트래블"},"42":{"settingsLines":["해상도/fps: 4K 24fps","셔터: 1/50, ISO 100~800","짐벌: Tilt-Locked"],"execution":"손목 비틀기 없이 카메라가 정면 락. 좁은 차 안, 엘리베이터 등에서 유용.","menuSteps":"1. 전원 켜기: 셔터 1회\n2. 모드 선택: 좌하단 → Video\n3. 해상도: 아래→위 스와이프 → 4K 24fps\n4. Pro 모드: 우측→왼쪽 → PRO ON\n5. 셔터·ISO: Exposure → M → 1/50, 100~800\n6. WB: White Balance → M → 실내 조명에 맞게\n7. 컬러: Colors → Normal\n8. 짐벌 모드: 위→아래 → 짐벌 → Tilt Locked\n9. 본체 회전: 손으로 본체를 정면으로 향하게 직접 돌림 (짐벌이 그대로 락)\n10. 녹화 시작: 셔터 1회\n11. 종료: 셔터 1회","editSteps":"","tip":"한 위치에서 여러 각도 인터뷰 컷.","mistake":"Follow 모드 사용 → 좁은 공간에서 짐벌 한계로 부드러움 깨짐. Tilt-Locked가 답.","fullName":"Flashlight Mode(플래시라이트) 🟢 초급 · 좁은 실내·차 안"},"43":{"settingsLines":["해상도/fps: 3K 30fps (세로는 최대 3K, 4K 9:16 불가)","셔터: 1/60, ISO 100","짐벌: Follow"],"execution":"본체 화면을 반시계 방향으로 90° 회전 → 자동 세로 모드 진입.","menuSteps":"1. 전원 켜기: 셔터 1회\n2. 세로 모드 진입: 본체 화면을 반시계 방향으로 90° 회전 (자동 세로 모드)\n3. 모드 선택: 좌하단 → Video\n4. 해상도: 아래→위 스와이프 → 3K 30fps (4K 9:16 불가)\n5. Pro 모드: 우측→왼쪽 → PRO ON\n6. 셔터·ISO: Exposure → M → 1/60, 100\n7. WB: White Balance → M → 5500K\n\n\n8. 컬러: Colors → Normal\n9. 짐벌 모드: 위→아래 → 짐벌 → Follow\n10. 녹화 시작: 셔터 1회\n11. 종료: 셔터 1회","editSteps":"","tip":"즉시 인스타 업로드용. 콘티 짜고 편집하는 콘텐츠는 가로 4K 추천.","mistake":"4K 세로를 기대 → Pocket 3는 세로 최대 3K. 더 높은 화질 원하면 가로 4K 후 9:16\n크롭이 정답.","fullName":"Vertical Shot(세로 직접 촬영) 🟢 초급 · 릴스"},"44":{"settingsLines":["해상도/fps: 4K 30fps","셔터: 1/60, ISO 100","짐벌: Follow","ActiveTrack 6.0","셀카봉 풀 익스텐션"],"execution":"셀카봉을 거꾸로 들어 카메라가 위에서 본인을 향함 → ActiveTrack로 본인 락 →\n셀카봉을 위로 들어 올리며 드론 같은 효과.","menuSteps":"1. 전원 켜기: 셔터 1회\n2. 셀카봉 거꾸로 장착: 카메라가 봉 아래쪽 향하게\n3. 모드 선택: 좌하단 → Video\n4. 해상도: 아래→위 스와이프 → 4K 30fps\n5. Pro 모드: 우측→왼쪽 → PRO ON\n6. 셔터·ISO: Exposure → M → 1/60, 100\n7. WB: White Balance → M → 5500K\n8. 컬러: Colors → Normal\n9. 짐벌 모드: 위→아래 → 짐벌 → Follow\n10. ActiveTrack: 본인 얼굴 더블 탭\n11. 녹화 시작: 셔터 1회\n12. 셀카봉 상승: 셀카봉을 위로 천천히 들어 올림 → 드론 같은 풀아웃\n13. 종료: 셔터 1회","editSteps":"","tip":"브이로그 인트로, 휴양지 영상에 드론 대체.","mistake":"ActiveTrack이 풀림 → 본인이 카메라에서 멀어지면 추적 풀림. 거리 일정.","fullName":"ActiveTrack Selfie Crane 🟠 중급 · 드론 같은 셀프 추적"},"45":{"settingsLines":["해상도/fps: 4K 30fps","셔터: 1/60, ISO 100","짐벌: Follow","Smart Gimbal: Dynamic Framing"],"execution":"Smart Gimbal Mode → Dynamic Framing 선택 → 5D 조이스틱으로 황금비/3분할\n위치 선택 → 조이스틱 누르면 그 위치에 피사체 자동 고정.","menuSteps":"1. 전원 켜기: 셔터 1회\n2. 모드 선택: 좌하단 → Video (Smart Gimbal은 Video 전용)\n3. 해상도: 아래→위 스와이프 → 4K 30fps\n4. Pro 모드: 우측→왼쪽 → PRO ON\n5. 셔터·ISO: Exposure → M → 1/60, 100\n6. WB: White Balance → M → 5500K\n7. 컬러: Colors → Normal\n8. 짐벌 모드: 위→아래 → 짐벌 → Follow\n9. Smart Gimbal Mode 진입: 좌측 인물 아이콘 탭 → Dynamic Framing 선택\n10. 위치 선택: 5D 조이스틱으로 화면 안 황금비/3분할 위치 중 선택\n11. 위치 락: 조이스틱 누름 → 그 위치에 피사체 트래킹 고정\n12. 녹화 시작: 셔터 1회\n13. 종료: 셔터 1회 → 인물 아이콘 다시 탭해 해제","editSteps":"","tip":"브이로그·인터뷰에서 피사체 위치를 화면 1/3에 자동 유지 → 시네마틱.","mistake":"자동에 맡기면 컴포지션이 일정하지 않음 → 사전에 위치를 명확히 정하고\n조이스틱으로 락.","fullName":"Dynamic Framing 🟢 초급 · 자동 컴포지션"},"46":{"settingsLines":["해상도/fps: 4K 30fps","셔터: 1/60, ISO 100","짐벌: Tilt-Locked","셀카봉 거꾸로"],"execution":"셀카봉을 거꾸로 잡아 카메라가 봉 아래쪽으로 → 지면 가까이 → 피사체 향해 푸시인.","menuSteps":"1. 전원 켜기: 셔터 1회\n2. 셀카봉 거꾸로 장착: 카메라가 봉 아래로\n3. 모드 선택: 좌하단 → Video\n4. 해상도: 아래→위 스와이프 → 4K 30fps\n5. Pro 모드: 우측→왼쪽 → PRO ON\n6. 셔터·ISO: Exposure → M → 1/60, 100\n7. WB: White Balance → M → 5500K\n8. 컬러: Colors → D-Log M\n9. 짐벌 모드: 위→아래 → 짐벌 → Tilt Locked\n10. 짐벌 속도: 걷는 사람 → Slow\n11. 카메라 위치: 봉 거꾸로 → 카메라가 무릎~지면 높이\n12. 녹화 시작: 셔터 1회\n13. 푸시인 실행: 닌자 걸음으로 피사체 향해 직선 전진\n14. 종료: 셔터 1회","editSteps":"","tip":"부동산 매물 외관 인트로, 자동차 광고 인트로에 압도적.","mistake":"봉이 흔들림 → 양손 그립 + 팔꿈치 압착.","fullName":"Underslung Push 🟠 중급 · 부동산·자동차 인트로"},"47":{"settingsLines":["해상도/fps: 4K 60fps 또는 120fps 일정 촬영 (후반에서 가변 속도)","셔터: 1/120 또는 1/240, ISO 100","짐벌: Follow","후반 작업: Premiere Time Remapping, Optical Flow 보간"],"execution":"일정한 60fps 또는 120fps로 촬영 → 후반에서 비트에 맞춰 100%→25%→100%\n키프레임.","menuSteps":"1. 전원 켜기: 셔터 1회\n2. 모드 선택: 슬로모용은 Slow Motion, 일반 가변 속도용은 Video\n3. 해상도: 아래→위 스와이프 → 4K 60fps (Video) 또는 4K 120fps (Slow Motion)\n\n\n4. Pro 모드: 우측→왼쪽 → PRO ON\n5. 셔터·ISO: Exposure → M → 1/120 (60fps) 또는 1/240 (120fps), 100\n6. WB: White Balance → M → 5500K\n7. 컬러: Colors → D-Log M\n8. 짐벌 모드: 위→아래 → 짐벌 → Follow\n9. 녹화 시작: 셔터 1회\n10. 일정 속도 촬영: 액션을 일정 속도로 촬영 (가변 속도 작업은 후반에서)\n11. 종료: 셔터 1회\n12. 후반 작업(Premiere): 클립 우클릭 → Time Remapping → Speed → 키프레임 추가 →\n100%→25%→100% → 키프레임 우클릭 → Time Interpolation → Optical Flow","editSteps":"","tip":"비트 드롭 직전 1초만 슬로 → 강조 효과. 음악비디오 핵심.","mistake":"보간 OFF → 슬로 구간이 끊김. 반드시 Optical Flow 보간 ON.","fullName":"Speed Ramp Setup 🟠 중급 · 음악비디오·비트컷"},"48":{"settingsLines":["해상도/fps: 4K 30fps","셔터: 1/60, ISO 100","짐벌: 자유","후반 작업: 클립 역재생"],"execution":"일반 촬영 후 후반에서 클립을 거꾸로 재생. 물 떨어지기 → 거꾸로 올라옴, 떨어진\n물체 → 손에 돌아옴.","menuSteps":"1. 전원 켜기: 셔터 1회\n2. 모드 선택: 좌하단 → Video\n3. 해상도: 아래→위 스와이프 → 4K 30fps\n4. Pro 모드: 우측→왼쪽 → PRO ON\n5. 셔터·ISO: Exposure → M → 1/60, 100\n6. WB: White Balance → M → 5500K\n7. 컬러: Colors → Normal\n8. 짐벌 모드: 위→아래 → 짐벌 → Follow\n9. 녹화 시작: 셔터 1회\n10. 일반 촬영: 액션 정상으로 촬영\n11. 종료: 셔터 1회\n12. 후반 작업(CapCut): 클립 선택 → 하단 메뉴에서 Reverse 탭 → 자동 역재생. 오디오는\n별도 음악으로 교체\n\n\n🎯 Part B. 상황별 (49~96)\nB-1. 브이로그 (49~55)","editSteps":"","tip":"물·연기·물체 떨어짐을 거꾸로 → 마법 같은 효과.","mistake":"오디오가 거꾸로 됨 → 음악만 새로 입히기.","fullName":"Reverse Playback 🟢 초급 · 음악비디오·광고"},"49":{"settingsLines":["해상도/fps: 4K 30fps","셔터: 1/60, ISO 100~400","컬러: Normal","AWB 또는 5500K","짐벌: Follow + Face Auto-Detect","거리: 팔 길이 (25~40cm)"],"execution":"5D 조이스틱 3회 누름으로 셀피 방향. 헤드룸 10~15%, 시선 살짝 위. 거리\n25~40cm(너무 가까우면 어안 왜곡).","menuSteps":"1. 전원 켜기: 셔터 1회\n2. 셀피 방향 전환: 5D 조이스틱 3회 누름 → 카메라가 본인 쪽\n3. 모드 선택: 좌하단 → Video\n4. 해상도: 아래→위 스와이프 → 4K 30fps\n5. Pro 모드: 우측→왼쪽 → PRO ON\n6. 셔터·ISO: Exposure → M → 1/60, 100~400\n7. WB: White Balance → AWB 또는 M → 5500K\n8. 컬러: Colors → Normal\n9. Glamour: PRO 패널 → Glamour Effects → 30~50%\n10. 짐벌 모드: 위→아래 → 짐벌 → Follow\n11. Face Auto-Detect: 좌측 인물 아이콘 → Face Auto-Detect\n12. 거리 확인: 팔 길이 (25~40cm) 유지\n13. 마이크: 야외라면 DJI Mic 2 페어링 권장 (Settings → Wireless Microphone)\n14. 녹화 시작: 셔터 1회\n15. 종료: 셔터 1회","editSteps":"","tip":"1.5~2초 호흡 J-cut, 3초 이내 후크.","mistake":"직사광 역광에서 얼굴 어두워짐 → 노출 +0.7 또는 옆으로 회전.","fullName":"셀프 토킹헤드(팔길이 거리) 🟢 초급"},"50":{"settingsLines":["해상도/fps: 4K 60fps (50% 슬로 여유)","셔터: 1/120, ISO 100","ND 필터: ND8~16","짐벌: Tilt-Locked"],"execution":"삼분할 + 전경에 책·꽃 배치로 깊이감. 음악 비트에 맞춰 1초 컷으로 빠르게.","menuSteps":"1. 전원 켜기: 셔터 1회\n2. 모드 선택: 좌하단 → Video\n3. 해상도: 아래→위 스와이프 → 4K 60fps\n4. Pro 모드: 우측→왼쪽 → PRO ON\n5. 셔터·ISO: Exposure → M → 1/120, 100\n6. WB: White Balance → M → 5500K\n7. 컬러: Colors → D-Log M\n8. 짐벌 모드: 위→아래 → 짐벌 → Tilt Locked\n9. 짐벌 속도: 걷는 사람 → Slow\n10. 컴포지션: 삼분할 + 전경 오브젝트 1~2m 이내\n11. 녹화 시작: 셔터 1회\n12. 각 컷 5초 이상 촬영: 짧은 무빙 + 디테일 조합\n13. 종료: 셔터 1회","editSteps":"","tip":"\"아침 루틴\" 같은 시퀀스로 묶기. 음악 비트에 1초씩 컷.","mistake":"b-roll 촬영 시간이 너무 짧음 → 컷당 5초 이상 촬영해 편집 여유.","fullName":"일상 인서트 B-roll 🟢 초급"},"51":{"settingsLines":["해상도/fps: 4K 24fps","셔터: 1/50, ISO 100","ND 필터: 야외 ND16","컬러: D-Log M","짐벌: Follow 또는 Tilt-Locked","광각 어댑터 권장","골든아워 우선"],"execution":"와이드 → 미디엄 → 클로즈업 3샷 룰. 1샷당 3~4초씩, 지명·날짜 하단 자막.","menuSteps":"1. 전원 켜기: 셔터 1회\n2. 광각 어댑터 장착: 권장\n3. 모드 선택: 좌하단 → Video\n4. 해상도: 아래→위 스와이프 → 4K 24fps\n5. Pro 모드: 우측→왼쪽 → PRO ON\n6. 셔터·ISO: Exposure → M → 1/50, 100\n7. WB: White Balance → M → 골든아워 4700K, 한낮 5500K\n8. 컬러: Colors → D-Log M\n9. 짐벌 모드: 위→아래 → 짐벌 → Follow\n10. 짐벌 속도: 걷는 사람 → Slow\n11. 3샷 시퀀스 촬영:\n○ 와이드 컷: 셀카봉 풀 익스텐션, 5초 촬영\n○ 미디엄 컷: 통상 거리, 5초 촬영 function DiffBadge({diff,small}){
  const cfg=DIFF_CONFIG[diff]||{};
  return <span style={{display:"inline-flex",alignItems:"center",gap:4,padding:small?"2px 7px":"3px 10px",borderRadius:99,fontSize:small?11:12,fontWeight:600,background:cfg.bg,color:cfg.color,whiteSpace:"nowrap"}}>{cfg.label}</span>
}
function PartBadge({part,small}){
  const cfg=PART_CONFIG[part]||{};
  return <span style={{display:"inline-flex",alignItems:"center",padding:small?"2px 7px":"3px 9px",borderRadius:99,fontSize:small?10:11,fontWeight:600,background:cfg.color+"18",color:cfg.color,whiteSpace:"nowrap"}}>{cfg.label}</span>
}

function parseMenuSteps(raw){
  if(!raw)return[];
  const lines=raw.split('\n').filter(l=>l.trim());
  return lines;
}

function Modal({tech,onClose}){
  const [tab,setTab]=useState(0);
  const detail=window.DETAIL_DATA[tech.id]||{};
  
  useEffect(()=>{
    const h=e=>{if(e.key==="Escape")onClose()};
    window.addEventListener("keydown",h);
    return()=>window.removeEventListener("keydown",h);
  },[]);

  const menuLines=parseMenuSteps(detail.menuSteps||"");
  const editLines=parseMenuSteps(detail.editSteps||"");
  const settingsLines=detail.settingsLines||[];
  const hasEdit=editLines.length>0;
  
  const tabs=[
    {label:"📋 설정값·실행방법",id:0},
    {label:"📱 메뉴 진입 경로",id:1},
    ...(hasEdit?[{label:"✂ 편집 경로",id:2}]:[]),
  ];

  const cfg=DIFF_CONFIG[tech.diff]||{};

  return(
    <div className="modal-overlay" onClick={e=>{if(e.target===e.currentTarget)onClose()}}>
      <div className="modal-box">
        {/* ── Header ── */}
        <div style={{padding:"20px 20px 0",borderBottom:"1px solid var(--border)"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8,marginBottom:10}}>
            <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}>
              <span style={{fontSize:11,fontWeight:700,color:"var(--text-muted)",fontFamily:"Inter"}}>#{String(tech.id).padStart(3,"0")}</span>
              <DiffBadge diff={tech.diff}/>
              <PartBadge part={tech.part}/>
              <span style={{fontSize:11,color:"var(--text-muted)",padding:"2px 8px",background:"var(--surface2)",borderRadius:99}}>{tech.group}</span>
            </div>
            <button onClick={onClose} style={{background:"var(--surface2)",border:"none",color:"var(--text-muted)",cursor:"pointer",width:30,height:30,borderRadius:8,fontSize:16,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>✕</button>
          </div>
          <h2 style={{fontSize:20,fontWeight:800,lineHeight:1.3,marginBottom:12}}>{tech.name}</h2>
          
          {/* Tabs */}
          <div style={{display:"flex",gap:0,borderBottom:"none",marginBottom:-1}}>
            {tabs.map(t=>(
              <button key={t.id} className={"tab-btn"+(tab===t.id?" active":"")} onClick={()=>setTab(t.id)}>{t.label}</button>
            ))}
          </div>
        </div>

        <div style={{padding:"20px"}}>
          {/* ── TAB 0: 설정값 + 실행방법 ── */}
          {tab===0&&(
            <div style={{display:"flex",flexDirection:"column",gap:20}}>
              {/* 설정값 */}
              {settingsLines.length>0&&(
                <section>
                  <h3 style={{fontSize:13,fontWeight:700,color:cfg.color,marginBottom:10,display:"flex",alignItems:"center",gap:6}}>
                    <span style={{background:cfg.bg,borderRadius:6,padding:"3px 8px"}}>📋 설정값</span>
                  </h3>
                  <div style={{background:"var(--surface2)",borderRadius:10,padding:"4px 14px"}}>
                    {settingsLines.map((line,i)=>{
                      const parts=line.split(/:s*/);
                      const key=parts[0];
                      const val=parts.slice(1).join(": ");
                      return(
                        <div key={i} className="setting-row">
                          <span style={{color:"var(--text-muted)",fontSize:13,minWidth:120,flexShrink:0}}>{key}</span>
                          <span style={{color:"var(--text)",fontSize:13,fontWeight:500}}>{val||line}</span>
                        </div>
                      );
                    })}
                  </div>
                </section>
              )}

              {/* 실행 방법 */}
              {detail.execution&&(
                <section>
                  <h3 style={{fontSize:13,fontWeight:700,color:"#58a6ff",marginBottom:10,display:"flex",alignItems:"center",gap:6}}>
                    <span style={{background:"rgba(88,166,255,.1)",borderRadius:6,padding:"3px 8px"}}>🎬 실행 방법</span>
                  </h3>
                  <div style={{background:"rgba(88,166,255,.06)",border:"1px solid rgba(88,166,255,.2)",borderRadius:10,padding:"14px 16px"}}>
                    <p style={{fontSize:14,lineHeight:1.8,color:"var(--text)",whiteSpace:"pre-wrap"}}>{detail.execution}</p>
                  </div>
                </section>
              )}

              {/* 편집 팁 */}
              {detail.tip&&(
                <section>
                  <div style={{background:"rgba(63,185,80,.06)",border:"1px solid rgba(63,185,80,.2)",borderRadius:10,padding:"12px 16px"}}>
                    <div style={{fontSize:11,fontWeight:700,color:"var(--green)",marginBottom:6,letterSpacing:".05em"}}>💡 편집 팁</div>
                    <p style={{fontSize:13.5,lineHeight:1.7,color:"var(--text)"}}>{detail.tip}</p>
                  </div>
                </section>
              )}

              {/* 흔한 실수 */}
              {detail.mistake&&(
                <section>
                  <div style={{background:"rgba(248,81,73,.06)",border:"1px solid rgba(248,81,73,.2)",borderRadius:10,padding:"12px 16px"}}>
                    <div style={{fontSize:11,fontWeight:700,color:"var(--red)",marginBottom:6,letterSpacing:".05em"}}>⚠️ 흔한 실수</div>
                    <p style={{fontSize:13.5,lineHeight:1.7,color:"var(--text)"}}>{detail.mistake}</p>
                  </div>
                </section>
              )}

              {/* Tags */}
              <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                {tech.tags.map(t=><span key={t} className="tag">#{t}</span>)}
              </div>
            </div>
          )}

          {/* ── TAB 1: 메뉴 진입 경로 ── */}
          {tab===1&&(
            <div>
              <div style={{background:"rgba(245,130,13,.06)",border:"1px solid rgba(245,130,13,.2)",borderRadius:10,padding:"10px 14px",marginBottom:16,fontSize:13,color:"var(--text-muted)"}}>
                📌 초급자용 단계별 메뉴 조작 순서입니다. 순서대로 따라하세요.
              </div>
              {menuLines.length>0?(
                <div>
                  {menuLines.map((line,i)=>{
                    const stepMatch=line.match(/^(\d+)\.\s*/);
                    const subMatch=line.match(/^[○●]\s*/);
                    if(stepMatch){
                      const num=stepMatch[1];
                      const text=line.replace(/^\d+\.\s*/,"");
                      return(
                        <div key={i} className="step-item">
                          <div className="step-num">{num}</div>
                          <div style={{flex:1,lineHeight:1.7}}>{text}</div>
                        </div>
                      );
                    } else if(subMatch){
                      const text=line.replace(/^[○●]\s*/,"");
                      return(
                        <div key={i} style={{display:"flex",gap:8,padding:"4px 0 4px 32px",fontSize:13,lineHeight:1.6,color:"var(--text-muted)"}}>
                          <span style={{color:"var(--accent)",flexShrink:0}}>›</span>
                          <span>{text}</span>
                        </div>
                      );
                    } else {
                      return(
                        <div key={i} style={{padding:"6px 0",fontSize:13,color:"var(--text-muted)",lineHeight:1.6,fontWeight:600}}>{line}</div>
                      );
                    }
                  })}
                </div>
              ):(
                <div style={{textAlign:"center",padding:"40px",color:"var(--text-muted)"}}>
                  <div style={{fontSize:32,marginBottom:12}}>📱</div>
                  <div>이 기법은 편집 소프트웨어(CapCut/Premiere)에서 진행합니다.<br/>편집 경로 탭을 확인하세요.</div>
                </div>
              )}
            </div>
          )}

          {/* ── TAB 2: 편집 경로 ── */}
          {tab===2&&hasEdit&&(
            <div>
              <div style={{background:"rgba(63,185,80,.06)",border:"1px solid rgba(63,185,80,.2)",borderRadius:10,padding:"10px 14px",marginBottom:16,fontSize:13,color:"var(--text-muted)"}}>
                ✂️ CapCut / Premiere Pro 편집 단계입니다.
              </div>
              {editLines.map((line,i)=>{
                const stepMatch=line.match(/^(\d+)\.\s*/);
                const subMatch=line.match(/^[○●]\s*/);
                if(stepMatch){
                  const num=stepMatch[1];
                  const text=line.replace(/^\d+\.\s*/,"");
                  return(
                    <div key={i} className="step-item">
                      <div className="step-num" style={{background:"var(--green)"}}>{num}</div>
                      <div style={{flex:1,lineHeight:1.7}}>{text}</div>
                    </div>
                  );
                } else if(subMatch){
                  const text=line.replace(/^[○●]\s*/,"");
                  return(
                    <div key={i} style={{display:"flex",gap:8,padding:"4px 0 4px 32px",fontSize:13,lineHeight:1.6,color:"var(--text-muted)"}}>
                      <span style={{color:"var(--green)",flexShrink:0}}>›</span>
                      <span>{text}</span>
                    </div>
                  );
                } else {
                  return <div key={i} style={{padding:"6px 0",fontSize:13,color:"var(--text-muted)",fontWeight:600}}>{line}</div>
                }
              })}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

function TechCard({tech,onClick}){
  const cfg=DIFF_CONFIG[tech.diff]||{};
  const detail=window.DETAIL_DATA[tech.id]||{};
  const settings=detail.settingsLines||[];
  return(
    <div onClick={()=>onClick(tech)} style={{background:"var(--surface)",border:"1px solid var(--border)",borderRadius:12,padding:"14px",cursor:"pointer",transition:"all .15s",position:"relative",overflow:"hidden"}}
    onMouseEnter={e=>{e.currentTarget.style.borderColor="rgba(245,130,13,.5)";e.currentTarget.style.transform="translateY(-1px)";e.currentTarget.style.boxShadow="0 6px 20px rgba(0,0,0,.35)"}}
    onMouseLeave={e=>{e.currentTarget.style.borderColor="var(--border)";e.currentTarget.style.transform="none";e.currentTarget.style.boxShadow="none"}}>
      <div style={{position:"absolute",top:0,left:0,right:0,height:2,background:cfg.color,opacity:.8}}></div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:6,marginBottom:8}}>
        <span style={{fontSize:11,fontWeight:700,color:"var(--text-muted)",fontFamily:"Inter"}}>#{String(tech.id).padStart(3,"0")}</span>
        <DiffBadge diff={tech.diff} small/>
      </div>
      <h3 style={{fontSize:13.5,fontWeight:700,lineHeight:1.4,marginBottom:6,color:"var(--text)"}}>{tech.name}</h3>
      {settings.length>0&&(
        <div style={{fontSize:11,color:"var(--text-muted)",marginBottom:8,lineHeight:1.5,overflow:"hidden",display:"-webkit-box",WebkitLineClamp:2,WebkitBoxOrient:"vertical"}}>
          {settings.slice(0,2).join(" · ")}
        </div>
      )}
      <div style={{display:"flex",gap:5,flexWrap:"wrap",alignItems:"center"}}>
        <PartBadge part={tech.part} small/>
        {tech.gimbal!=="모든 모드"&&tech.gimbal!=="자유"&&tech.gimbal!=="없음"&&tech.gimbal!=="환경에 맞게"&&tech.gimbal!=="삼각대"&&(
          <span style={{fontSize:10,padding:"2px 6px",borderRadius:99,background:"var(--surface2)",color:"var(--text-muted)",fontWeight:500}}>{tech.gimbal}</span>
        )}
      </div>
    </div>
  );
}

function FilterChip({label,active,onClick,color}){
  return(
    <button className="chip" onClick={onClick} style={{background:active?(color||"var(--accent)")+"22":"transparent",color:active?(color||"var(--accent)"):"var(--text-muted)",borderColor:active?(color||"var(--accent)")+"55":"var(--border)",fontSize:12}}>
      {label}
    </button>
  );
}

function App(){
  const [search,setSearch]=useState("");
  const [diffFilter,setDiffFilter]=useState(null);
  const [partFilter,setPartFilter]=useState(null);
  const [gimbalFilter,setGimbalFilter]=useState(null);
  const [situFilter,setSituFilter]=useState(null);
  const [selected,setSelected]=useState(null);
  const [sidebarOpen,setSidebarOpen]=useState(typeof window!=="undefined"&&window.innerWidth>768);
  const [view,setView]=useState("grid");
  const [isMobile,setIsMobile]=useState(typeof window!=="undefined"&&window.innerWidth<=768);
  useEffect(()=>{
    const onResize=()=>setIsMobile(window.innerWidth<=768);
    window.addEventListener("resize",onResize);
    return()=>window.removeEventListener("resize",onResize);
  },[]);
  const closeIfMobile=useCallback(()=>{if(isMobile)setSidebarOpen(false)},[isMobile]);

  const filtered=useMemo(()=>{
    return TECHNIQUES.filter(t=>{
      if(search){
        const q=search.toLowerCase();
        if(!t.name.toLowerCase().includes(q)&&!t.desc.toLowerCase().includes(q)&&!t.tags.some(tg=>tg.toLowerCase().includes(q))&&!t.group.toLowerCase().includes(q)&&String(t.id)!==q.replace("#",""))return false;
      }
      if(diffFilter&&t.diff!==diffFilter)return false;
      if(partFilter&&t.part!==partFilter)return false;
      if(gimbalFilter&&!t.gimbal.includes(gimbalFilter))return false;
      if(situFilter){const sits=getSituations(t);if(!sits.includes(situFilter))return false;}
      return true;
    });
  },[search,diffFilter,partFilter,gimbalFilter,situFilter]);

  const hasFilters=diffFilter||partFilter||gimbalFilter||situFilter||search;
  const clearFilters=()=>{setDiffFilter(null);setPartFilter(null);setGimbalFilter(null);setSituFilter(null);setSearch("")};

  const stats=useMemo(()=>({
    total:TECHNIQUES.length,
    beginner:TECHNIQUES.filter(t=>t.diff==="초급").length,
    intermediate:TECHNIQUES.filter(t=>t.diff==="중급").length,
    advanced:TECHNIQUES.filter(t=>t.diff==="고급").length,
  }),[]);

  return(
    <div style={{display:"flex",flexDirection:"column",height:"100vh",overflow:"hidden"}}>
      {/* Header */}
      <header style={{background:"var(--surface)",borderBottom:"1px solid var(--border)",padding:"0 12px",height:52,display:"flex",alignItems:"center",gap:8,flexShrink:0}}>
        <button onClick={()=>setSidebarOpen(!sidebarOpen)} style={{background:"var(--surface2)",border:"1px solid var(--border)",borderRadius:8,width:36,height:36,color:"var(--text)",cursor:"pointer",fontSize:16,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>☰</button>
        <div style={{display:"flex",alignItems:"center",gap:6,flexShrink:0}}>
          <span style={{fontSize:18}}>📸</span>
          <span style={{fontWeight:800,fontSize:14}} className="mobile-hide">포켓3 촬영 기법</span>
          <span style={{background:"var(--accent)",color:"#fff",fontSize:10,fontWeight:700,padding:"2px 6px",borderRadius:99}}>130</span>
        </div>
        <div style={{flex:1,maxWidth:380,position:"relative",minWidth:0}}>
          <span style={{position:"absolute",left:9,top:"50%",transform:"translateY(-50%)",color:"var(--text-muted)",fontSize:13,pointerEvents:"none"}}>🔍</span>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="검색..."
            style={{width:"100%",background:"var(--bg)",border:"1px solid var(--border)",borderRadius:8,padding:"7px 10px 7px 30px",color:"var(--text)",fontSize:13,fontFamily:"'Noto Sans KR',sans-serif",outline:"none"}}
          />
          {search&&<button onClick={()=>setSearch("")} style={{position:"absolute",right:7,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",color:"var(--text-muted)",cursor:"pointer",fontSize:13,padding:2}}>✕</button>}
        </div>
        <div style={{display:"flex",gap:5,marginLeft:"auto"}} className="mobile-hide">
          {["grid","list"].map(v=>(
            <button key={v} onClick={()=>setView(v)} style={{background:view===v?"var(--surface2)":"none",border:"1px solid "+(view===v?"var(--border)":"transparent"),borderRadius:6,padding:"4px 9px",color:view===v?"var(--text)":"var(--text-muted)",cursor:"pointer",fontSize:12}}>
              {v==="grid"?"⊞ 그리드":"☰ 리스트"}
            </button>
          ))}
        </div>
      </header>

      <div style={{display:"flex",flex:1,overflow:"hidden",position:"relative"}}>
        {/* Mobile backdrop */}
        {isMobile&&sidebarOpen&&<div className="mobile-backdrop" onClick={()=>setSidebarOpen(false)}></div>}
        {/* Sidebar */}
        {sidebarOpen&&(
          <aside className={isMobile?"mobile-sidebar open":""} style={{width:210,background:"var(--surface)",borderRight:"1px solid var(--border)",padding:"14px 12px",overflowY:"auto",flexShrink:0,display:"flex",flexDirection:"column",gap:18}}>
            <div style={{background:"var(--surface2)",borderRadius:10,padding:"10px 12px"}}>
              <div style={{fontSize:10,fontWeight:700,color:"var(--text-muted)",marginBottom:8,letterSpacing:".05em"}}>전체 현황</div>
              {[["전체",stats.total,"var(--text)"],["🟢 초급",stats.beginner,"var(--green)"],["🟠 중급",stats.intermediate,"var(--orange)"],["🔴 고급",stats.advanced,"var(--red)"]].map(([l,n,c])=>(
                <div key={l} style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                  <span style={{fontSize:12,color:c}}>{l}</span>
                  <span style={{fontSize:13,fontWeight:700,color:c}}>{n}</span>
                </div>
              ))}
            </div>

            {[
              ["난이도",["초급","중급","고급"].map(d=>({label:DIFF_CONFIG[d].label,val:d,color:DIFF_CONFIG[d].color})),diffFilter,setDiffFilter],
              ["파트",Object.entries(PART_CONFIG).map(([p,c])=>({label:"Part "+p+" · "+c.label,val:p,color:c.color})),partFilter,setPartFilter],
              ["짐벌 모드",GIMBAL_MODES.map(g=>({label:g,val:g})),gimbalFilter,setGimbalFilter],
              ["촬영 상황",SITUATIONS.map(s=>({label:s,val:s})),situFilter,setSituFilter],
            ].map(([title,items,active,setActive])=>(
              <div key={title}>
                <div style={{fontSize:10,fontWeight:700,color:"var(--text-muted)",marginBottom:6,letterSpacing:".05em"}}>{title}</div>
                <div style={{display:"flex",flexDirection:"column",gap:4}}>
                  {items.map(it=>(
                    <FilterChip key={it.val} label={it.label} active={active===it.val} color={it.color} onClick={()=>setActive(active===it.val?null:it.val)}/>
                  ))}
                </div>
              </div>
            ))}

            {hasFilters&&<button onClick={clearFilters} style={{background:"var(--surface2)",border:"1px solid var(--border)",borderRadius:8,padding:"7px 10px",color:"var(--text-muted)",cursor:"pointer",fontSize:12,fontFamily:"'Noto Sans KR',sans-serif"}}>🗑 필터 초기화</button>}
          </aside>
        )}

        {/* Main */}
        <main style={{flex:1,overflowY:"auto",padding:"14px 16px"}}>
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}>
            <span style={{fontSize:13,color:"var(--text-muted)"}}>{hasFilters?filtered.length+"개 결과":"전체 "+filtered.length+"개 기법"}</span>
            {hasFilters&&<button onClick={clearFilters} style={{background:"none",border:"none",color:"var(--accent)",cursor:"pointer",fontSize:12}}>전체 보기</button>}
          </div>

          {filtered.length===0?(
            <div style={{textAlign:"center",padding:"60px 20px",color:"var(--text-muted)"}}>
              <div style={{fontSize:40,marginBottom:12}}>🎬</div>
              <div style={{fontSize:15,fontWeight:600,marginBottom:6}}>검색 결과가 없습니다</div>
              <div style={{fontSize:13}}>다른 키워드나 필터를 시도해보세요</div>
            </div>
          ):view==="grid"||isMobile?(
            <div className="grid-cards" style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(220px,1fr))",gap:10}}>
              {filtered.map(t=><TechCard key={t.id} tech={t} onClick={setSelected}/>)}
            </div>
          ):(
            <div style={{display:"flex",flexDirection:"column",gap:6}}>
              {filtered.map(t=>{
                const detail=window.DETAIL_DATA[t.id]||{};
                const settings=(detail.settingsLines||[]).slice(0,2).join(" · ");
                return(
                  <div key={t.id} onClick={()=>setSelected(t)} style={{background:"var(--surface)",border:"1px solid var(--border)",borderRadius:10,padding:"11px 14px",cursor:"pointer",display:"flex",alignItems:"center",gap:12,transition:"all .1s"}}
                  onMouseEnter={e=>{e.currentTarget.style.borderColor="rgba(245,130,13,.4)";e.currentTarget.style.background="var(--surface2)"}}
                  onMouseLeave={e=>{e.currentTarget.style.borderColor="var(--border)";e.currentTarget.style.background="var(--surface)"}}>
                    <span style={{fontSize:11,fontWeight:700,color:"var(--text-muted)",fontFamily:"Inter",width:28,flexShrink:0}}>#{t.id}</span>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontWeight:600,fontSize:13.5,marginBottom:2}}>{t.name}</div>
                      <div style={{fontSize:11.5,color:"var(--text-muted)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{settings}</div>
                    </div>
                    <div style={{display:"flex",gap:5,flexShrink:0}}>
                      <DiffBadge diff={t.diff} small/>
                      <PartBadge part={t.part} small/>
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </main>
      </div>
      {selected&&<Modal tech={selected} onClose={()=>setSelected(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
